<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio Julie Barroso | Extensão de Cílios</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

<style>
/* ===== VARIÁVEIS DE TEMA BARBIE PREMIUM ===== */
:root {
  --bg-color: #FDF0F5; /* Rosa fundo muito suave */
  --text-dark: #4A0E2E; /* Ameixa escuro (Magenta fechado) para leitura */
  --text-light: #9C637A; /* Rosa envelhecido médio */
  --accent-main: #FF1493; /* Rosa Barbie Vibrante (Deep Pink) */
  --accent-light: #FF69B4; /* Hot Pink */
  
  --glass-bg: rgba(255, 255, 255, 0.85);
  --glass-border: rgba(255, 105, 180, 0.3);
  --shadow-soft: 0 20px 40px rgba(255, 20, 147, 0.08);
  
  --font-title: 'Playfair Display', serif;
  --font-body: 'Montserrat', sans-serif;
}

* { 
  box-sizing: border-box; 
  margin: 0; 
  padding: 0; 
}

body {
  font-family: var(--font-body);
  background-color: var(--bg-color);
  color: var(--text-dark);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ===== INTRO BARBIE CINEMATOGRÁFICA ===== */
.intro {
  position: fixed; inset: 0;
  /* Gradiente Rosa Barbie Poderoso */
  background: linear-gradient(135deg, #FF1493 0%, #D81B60 100%);
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  color: #fff; z-index: 9999; overflow: hidden;
  cursor: pointer;
  transition: opacity 1.5s cubic-bezier(0.4, 0, 0.2, 1), transform 1.5s cubic-bezier(0.4, 0, 0.2, 1);
}
.intro.hide { opacity: 0; transform: scale(1.05); pointer-events: none; }

.intro::after {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(circle at center, rgba(255, 255, 255, 0.2) 0%, transparent 70%);
  pointer-events: none;
}

.intro-logo {
  text-align: center;
  z-index: 2;
  animation: floatUp 2s ease-out forwards;
}

@keyframes floatUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

.intro-studio {
  font-size: 11px; letter-spacing: 6px; 
  color: rgba(255, 255, 255, 0.9); text-transform: uppercase; margin-bottom: 15px;
  font-weight: 500;
}

.intro-name {
  font-family: var(--font-title);
  font-size: 48px; font-weight: 400; letter-spacing: 2px;
  color: #FFFFFF;
  text-shadow: 0 4px 15px rgba(0,0,0,0.1);
  margin-bottom: 20px;
}

.intro-tap-btn {
  font-size: 10px; letter-spacing: 3px; color: rgba(255,255,255,0.8);
  text-transform: uppercase; margin-top: 40px;
  border-bottom: 1px solid rgba(255,255,255,0.5);
  padding-bottom: 5px;
  animation: pulseOpacity 2s infinite;
}

@keyframes pulseOpacity {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 1; }
}

/* ===== HEADER ===== */
.header-premium {
  padding: 40px 20px 20px;
  text-align: center;
}

.logo-main-name {
  font-family: var(--font-title);
  font-size: 32px; font-weight: 400; letter-spacing: 4px;
  color: var(--accent-main);
}

.logo-tagline {
  font-size: 10px; letter-spacing: 4px; color: var(--text-light);
  text-transform: uppercase; margin-top: 8px; font-weight: 500;
}

/* ===== LAYOUT PRINCIPAL ===== */
.container {
  display: flex; 
  max-width: 1200px;
  margin: 0 auto;
  padding: 20px 30px 60px;
  gap: 40px;
  flex: 1;
  width: 100%;
}

/* ===== VÍDEO ADAPTADO ===== */
.video-wrapper {
  flex: 1.2;
  position: relative;
  border-radius: 24px;
  overflow: hidden;
  box-shadow: var(--shadow-soft);
  background-color: #F8D8E6; /* Placeholder rosa suave */
  display: flex;
}

.video-wrapper video {
  width: 100%;
  height: 600px;
  object-fit: cover;
  transition: transform 10s linear;
}

.video-wrapper:hover video {
  transform: scale(1.03);
}

/* Botão de som Minimalista */
.sound-btn {
  position: absolute;
  bottom: 30px;
  right: 30px;
  z-index: 10;
  background: rgba(255, 20, 147, 0.4); /* Fundo rosa translúcido */
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.5);
  border-radius: 50px;
  padding: 12px 24px;
  color: white;
  font-family: var(--font-body);
  font-size: 11px;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  transition: all 0.3s ease;
}

.sound-btn:hover {
  background: var(--accent-main);
}

.sound-btn-icon { font-size: 14px; }

/* ===== SIDEBAR / CONTEÚDO (GLASSMORPHISM) ===== */
.sidebar {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.tabs {
  display: flex;
  gap: 10px;
  margin-bottom: 30px;
}

.tab-btn {
  flex: 1;
  background: transparent;
  border: none;
  border-bottom: 2px solid rgba(255, 105, 180, 0.2);
  padding: 15px 0;
  font-family: var(--font-body);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--text-light);
  cursor: pointer;
  transition: all 0.3s ease;
}

.tab-btn:hover { color: var(--accent-main); }

.tab-btn.active {
  color: var(--accent-main);
  border-bottom-color: var(--accent-main);
  font-weight: 600;
}

.content-area {
  background: var(--glass-bg);
  backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  padding: 30px;
  box-shadow: var(--shadow-soft);
  flex: 1;
  overflow-y: auto;
  max-height: 520px;
}

/* Custom Scrollbar elegante */
.content-area::-webkit-scrollbar { width: 4px; }
.content-area::-webkit-scrollbar-track { background: transparent; }
.content-area::-webkit-scrollbar-thumb { background: var(--accent-light); border-radius: 10px; }

/* ===== CARDS DE SERVIÇOS ===== */
.card {
  display: flex; align-items: center; gap: 20px;
  padding: 15px 0; border-bottom: 1px solid rgba(255, 105, 180, 0.15);
  cursor: pointer; transition: transform 0.3s ease, padding-left 0.3s ease;
}
.card:last-child { border-bottom: none; }
.card:hover { transform: translateX(5px); padding-left: 10px; }

.card-thumb {
  width: 60px; height: 60px; border-radius: 50%;
  background-color: #FDF0F5;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; overflow: hidden; flex-shrink: 0;
  border: 1px solid var(--glass-border);
}
.card-thumb img { width: 100%; height: 100%; object-fit: cover; }

.card-info { display: flex; flex-direction: column; gap: 4px; }
.card-title { font-family: var(--font-title); font-size: 18px; color: var(--text-dark); }
.card-desc-mini { font-size: 11px; color: var(--text-light); font-weight: 400; }
.card-arrow { margin-left: auto; color: var(--accent-main); opacity: 0; transition: opacity 0.3s; }
.card:hover .card-arrow { opacity: 1; }

/* ===== DETALHE DO SERVIÇO ===== */
.detalhe-wrap { animation: fadeIn 0.4s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.detalhe-img-wrap {
  width: 100%; height: 220px; border-radius: 16px; overflow: hidden;
  background-color: #FDF0F5; display: flex; align-items: center; justify-content: center;
  font-size: 60px; margin-bottom: 24px; border: 1px solid var(--glass-border);
}
.detalhe-img-wrap img { width: 100%; height: 100%; object-fit: cover; }

.detalhe-nome { font-family: var(--font-title); font-size: 28px; color: var(--accent-main); margin-bottom: 10px; }
.detalhe-texto { font-size: 13px; line-height: 1.8; color: var(--text-dark); margin-bottom: 24px; font-weight: 400; }

.detalhe-info { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 30px; }
.detalhe-item { display: flex; flex-direction: column; gap: 4px; }
.detalhe-item-label { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-light); }
.detalhe-item-value { font-size: 12px; color: var(--accent-main); font-weight: 600; }

.btn-voltar {
  background: transparent; border: 1px solid var(--accent-main); color: var(--accent-main);
  padding: 14px 24px; border-radius: 40px; cursor: pointer; font-size: 11px; text-transform: uppercase;
  letter-spacing: 2px; transition: all 0.3s ease; width: 100%; font-family: var(--font-body); font-weight: 500;
}
.btn-voltar:hover { background: var(--accent-main); color: #fff; }

/* ===== FOOTER ===== */
footer {
  text-align: center; padding: 30px; font-size: 10px;
  letter-spacing: 2px; text-transform: uppercase; color: var(--text-light);
  margin-top: auto;
}

/* ===== RESPONSIVO ===== */
@media(max-width: 900px){
  .container { flex-direction: column; padding: 10px 20px 40px; gap: 20px; }
  .video-wrapper video { height: 400px; }
  .intro-name { font-size: 36px; }
  .content-area { max-height: none; padding: 20px; }
}
@media(max-width: 480px){
  .video-wrapper video { height: 350px; }
  .logo-main-name { font-size: 26px; }
  .tab-btn { font-size: 9px; }
}
</style>
</head>
<body>

<div class="intro" id="intro" onclick="fecharIntro()">
  <div class="intro-logo">
    <div class="intro-studio">Studio</div>
    <div class="intro-name">Julie Barroso</div>
    <div class="intro-studio" style="letter-spacing: 4px; font-size: 9px; color: rgba(255,255,255,0.7);">Extensão de Cílios</div>
    <div class="intro-tap-btn">Toque para descobrir</div>
  </div>
</div>

<header class="header-premium">
  <div class="logo-main-name">Julie Barroso</div>
  <div class="logo-tagline">Studio de Cílios</div>
</header>

<div class="container">
  
  <div class="video-wrapper">
    <video id="videoPlayer" autoplay muted loop playsinline>
      <source src="apresentacao.mp4" type="video/mp4">
      Seu navegador não suporta vídeos.
    </video>
    <button class="sound-btn" id="soundBtn" onclick="toggleSound()">
      <span class="sound-btn-icon" id="soundIcon">🔇</span>
      <span id="soundText">Som Desativado</span>
    </button>
  </div>

  <div class="sidebar">
    <div class="tabs">
      <button class="tab-btn active" data-tab="1" onclick="showTab(1)">Sobre</button>
      <button class="tab-btn" data-tab="2" onclick="showTab(2)">Serviços</button>
      <button class="tab-btn" data-tab="3" onclick="showTab(3)">Localização</button>
    </div>
    
    <div class="content-area" id="content">
      </div>
  </div>
</div>

<footer>© Studio Julie Barroso • Todos os direitos reservados</footer>

<script>
/* DADOS DO CATÁLOGO */
var proc = {
  'Clássico':     { imagem:'', emoji:'✨', resumo:'Natural e delicado, ideal para o dia a dia.', duracao:'2h', fixacao:'3–4 semanas', descricao:'O fio a fio clássico aplica uma extensão por cílio natural, resultando em um olhar mais alongado e definido, mantendo a máxima leveza e elegância. A escolha perfeita para uma beleza sofisticada e discreta.' },
  'Volume Russo': { imagem:'', emoji:'🖤', resumo:'Volume intenso e profundamente sofisticado.', duracao:'2h30', fixacao:'3–4 semanas', descricao:'Técnica artesanal que aplica delicados leques de fios ultrafinos por cílio natural. Cria um efeito preenchido e luxuoso, perfeito para quem busca um olhar marcante e inesquecível.' },
  'Híbrido':      { imagem:'', emoji:'💫', resumo:'A união perfeita entre textura e volume.', duracao:'2h', fixacao:'3–4 semanas', descricao:'Combina estrategicamente fios clássicos e leques de volume russo na mesma aplicação. O resultado é um design texturizado, moderno e incrivelmente versátil para qualquer ocasião.' },
  'Mega Volume':  { imagem:'', emoji:'👑', resumo:'O máximo de drama, densidade e glamour.', duracao:'3h', fixacao:'3–4 semanas', descricao:'Leques avançados com fios de espessura mínima, garantindo densidade extrema sem pesar os fios naturais. Para mulheres que não abrem mão de uma presença arrebatadora.' },
  'Fox Eyes':     { imagem:'', emoji:'🦊', resumo:'Efeito alongado, sensual e moderno.', duracao:'2h', fixacao:'3–4 semanas', descricao:'Técnica de mapping que alonga os cílios na extremidade externa dos olhos. Levanta o olhar, criando um efeito delineado que é a tendência absoluta do momento.' },
  'Lash Lift':    { imagem:'', emoji:'🌿', resumo:'Beleza natural realçada e curvada.', duracao:'1h', fixacao:'6–8 semanas', descricao:'Tratamento que nutre, curva e pigmenta seus próprios cílios. Um procedimento de baixa manutenção que abre o olhar instantaneamente, durando semanas com aspecto impecável.' }
};

/* FECHAR INTRODUÇÃO */
function fecharIntro() {
  var el = document.getElementById('intro');
  el.classList.add('hide');
  setTimeout(function(){ el.style.display = 'none'; }, 1500);
}

/* CONTROLE DE SOM CUSTOMIZADO */
function toggleSound() {
  var v = document.getElementById('videoPlayer');
  var icon = document.getElementById('soundIcon');
  var text = document.getElementById('soundText');
  
  v.muted = !v.muted;
  
  if(v.muted) {
    icon.textContent = '🔇';
    text.textContent = 'Som Desativado';
  } else {
    icon.textContent = '🔊';
    text.textContent = 'Som Ativado';
  }
}

/* CONTROLE DAS ABAS */
function showTab(tab) {
  var buttons = document.querySelectorAll('.tab-btn');
  buttons.forEach(btn => {
    btn.classList.toggle('active', parseInt(btn.getAttribute('data-tab')) === tab);
  });

  var content = document.getElementById('content');
  
  if(tab === 1) {
    content.innerHTML = `
      <h3 style="font-family: var(--font-title); font-size: 24px; font-weight: 400; margin-bottom: 15px; color: var(--accent-main);">A Arte do Olhar</h3>
      <p style="font-size: 13px; line-height: 1.8; color: var(--text-dark); font-weight: 400; margin-bottom: 15px;">
        Bem-vinda ao espaço onde a beleza encontra a técnica milimétrica. No Studio Julie Barroso, acreditamos que a extensão de cílios vai além da estética — é sobre confiança, luxo e personalização.
      </p>
      <p style="font-size: 13px; line-height: 1.8; color: var(--text-dark); font-weight: 400;">
        Utilizamos exclusivamente materiais premium e métodos aprovados de visagismo para desenhar o conjunto perfeito para o formato do seu rosto.
      </p>
    `;
  }
  else if(tab === 2) {
    var html = '<div style="display:flex; flex-direction:column;">';
    Object.keys(proc).forEach(function(n){
      var p = proc[n];
      var thumbHtml = p.imagem 
        ? `<img src="${p.imagem}" alt="${n}">` 
        : p.emoji;
        
      html += `
        <div class="card" onclick="detalhe('${n}')">
          <div class="card-thumb">${thumbHtml}</div>
          <div class="card-info">
            <div class="card-title">${n}</div>
            <div class="card-desc-mini">${p.resumo}</div>
          </div>
          <div class="card-arrow">→</div>
        </div>
      `;
    });
    html += '</div>';
    content.innerHTML = html;
  }
  else if(tab === 3) {
    content.innerHTML = `
      <h3 style="font-family: var(--font-title); font-size: 24px; font-weight: 400; margin-bottom: 15px; color: var(--accent-main);">Nosso Endereço</h3>
      <p style="font-size: 12px; color: var(--text-dark); margin-bottom: 20px;">Um ambiente pensado para o seu total relaxamento.</p>
      <div style="width:100%; height:250px; background:#F8D8E6; border-radius:12px; overflow:hidden;">
        <iframe src="https://maps.google.com/maps?q=Studio+Julie+Barroso&t=&z=13&ie=UTF8&iwloc=&output=embed" width="100%" height="100%" style="border:none;"></iframe>
      </div>
    `;
  }
}

/* EXIBIR DETALHES DO PROCEDIMENTO */
function detalhe(nome) {
  var p = proc[nome];
  var content = document.getElementById('content');
  
  var imgHtml = p.imagem 
    ? `<img src="${p.imagem}" alt="${nome}">` 
    : p.emoji;
    
  content.innerHTML = `
    <div class="detalhe-wrap">
      <div class="detalhe-img-wrap">${imgHtml}</div>
      <div class="detalhe-nome">${nome}</div>
      <p class="detalhe-texto">${p.descricao}</p>
      
      <div class="detalhe-info">
        <div class="detalhe-item">
          <span class="detalhe-item-label">Duração</span>
          <span class="detalhe-item-value">${p.duracao}</span>
        </div>
        <div class="detalhe-item">
          <span class="detalhe-item-label">Manutenção</span>
          <span class="detalhe-item-value">${p.fixacao}</span>
        </div>
      </div>
      
      <button class="btn-voltar" onclick="showTab(2)">Retornar ao Menu</button>
    </div>
  `;
}

// Iniciar na aba de serviços (aba 2) para ser mais direto comercialmente
showTab(2);
</script>

</body>
</html>
