<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio Julie Barroso</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ffffff, #fce4ec);
}

/* ===== INTRO PREMIUM ===== */
.intro {
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at 50% 35%, #3d0028 0%, #1a0012 50%, #080005 100%);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 0;
  color: white;
  z-index: 9999;
  overflow: hidden;
  cursor: pointer;
  transition: opacity 1.1s ease, transform 1.1s ease;
}
.intro.hide {
  opacity: 0;
  transform: scale(1.04);
  pointer-events: none;
}

/* ANÉIS */
.intro-ring {
  position: absolute;
  border-radius: 50%;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
}
.intro-ring:nth-child(1) {
  width: 360px; height: 360px;
  border: 0.8px solid rgba(216,27,96,0.22);
  animation: ring-pulse 5s ease-in-out infinite 0s;
}
.intro-ring:nth-child(2) {
  width: 540px; height: 540px;
  border: 0.5px solid rgba(216,27,96,0.12);
  animation: ring-pulse 5s ease-in-out infinite 1s;
}
.intro-ring:nth-child(3) {
  width: 720px; height: 720px;
  border: 0.5px solid rgba(216,27,96,0.06);
  animation: ring-pulse 5s ease-in-out infinite 2s;
}
@keyframes ring-pulse {
  0%, 100% { opacity: 0.4; transform: translate(-50%,-50%) scale(1); }
  50%       { opacity: 1;   transform: translate(-50%,-50%) scale(1.025); }
}

/* BRILHO CHÃO */
.intro-floor {
  position: absolute;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 500px; height: 120px;
  background: radial-gradient(ellipse at center bottom, rgba(216,27,96,0.35) 0%, transparent 70%);
  pointer-events: none;
}

/* BRILHO CENTRAL */
.intro-glow {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 280px; height: 280px;
  background: radial-gradient(ellipse at center, rgba(216,27,96,0.08) 0%, transparent 70%);
  border-radius: 50%;
  animation: glow-breathe 4.5s ease-in-out infinite;
  pointer-events: none;
}
@keyframes glow-breathe {
  0%, 100% { opacity: 0.5; transform: translate(-50%,-50%) scale(1); }
  50%       { opacity: 1;   transform: translate(-50%,-50%) scale(1.15); }
}

/* PARTÍCULAS */
.intro-particles {
  position: absolute;
  inset: 0;
  pointer-events: none;
}
.intro-particle {
  position: absolute;
  border-radius: 50%;
  animation: particle-rise linear infinite;
}
@keyframes particle-rise {
  0%   { opacity: 0;   transform: translateY(0)      scale(1); }
  10%  { opacity: 1; }
  80%  { opacity: 0.5; }
  100% { opacity: 0;   transform: translateY(-100vh) scale(0.2); }
}

/* LOGO */
.intro-logo {
  position: relative;
  z-index: 4;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 44px;
}
.intro-studio {
  font-family: 'Segoe UI', sans-serif;
  font-size: 11px;
  letter-spacing: 10px;
  color: rgba(255,200,230,0.6);
  text-transform: uppercase;
  margin-bottom: 14px;
}
.intro-name-row {
  display: flex;
  align-items: center;
  gap: 22px;
}
.intro-line {
  width: 50px;
  height: 0.5px;
  background: rgba(255,150,200,0.5);
  flex-shrink: 0;
}
.intro-name {
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 40px;
  color: #ffffff;
  font-weight: normal;
  letter-spacing: 6px;
  white-space: nowrap;
}
.intro-tagline {
  font-family: 'Segoe UI', sans-serif;
  font-size: 10px;
  letter-spacing: 7px;
  color: rgba(255,160,210,0.45);
  text-transform: uppercase;
  margin-top: 16px;
}
.intro-divider {
  width: 36px;
  height: 0.5px;
  background: rgba(216,27,96,0.45);
  margin-top: 16px;
}

/* BOTÃO TOQUE PARA ENTRAR */
.intro-tap {
  position: relative;
  z-index: 4;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}
.intro-tap-btn {
  font-family: 'Segoe UI', sans-serif;
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 5px;
  color: #fff;
  text-transform: uppercase;
  padding: 16px 48px;
  border: 1px solid rgba(216,27,96,0.7);
  border-radius: 60px;
  background: linear-gradient(135deg, rgba(216,27,96,0.28), rgba(173,20,87,0.22));
  box-shadow: 0 0 0 0 rgba(216,27,96,0.5);
  animation: ripple-pulse 2.2s ease-out infinite;
  white-space: nowrap;
  transition: background 0.3s, border-color 0.3s;
}
.intro-tap-btn:hover {
  background: linear-gradient(135deg, rgba(216,27,96,0.5), rgba(173,20,87,0.4));
  border-color: rgba(255,100,170,0.9);
}
@keyframes ripple-pulse {
  0%   { box-shadow: 0 0 0 0   rgba(216,27,96,0.55); }
  65%  { box-shadow: 0 0 0 18px rgba(216,27,96,0);   }
  100% { box-shadow: 0 0 0 0   rgba(216,27,96,0);    }
}

/* SETA ANIMADA */
.intro-tap-arrow {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  animation: arrow-drop 1.6s ease-in-out infinite;
}
.intro-tap-arrow span {
  display: block;
  width: 10px;
  height: 10px;
  border-right: 1.5px solid rgba(255,140,200,0.7);
  border-bottom: 1.5px solid rgba(255,140,200,0.7);
  transform: rotate(45deg);
  animation: arrow-fade 1.6s ease-in-out infinite;
}
.intro-tap-arrow span:nth-child(2) { animation-delay: 0.2s; opacity: 0.5; }
.intro-tap-arrow span:nth-child(3) { animation-delay: 0.4s; opacity: 0.25; }
@keyframes arrow-drop {
  0%, 100% { transform: translateY(0); }
  50%       { transform: translateY(6px); }
}
@keyframes arrow-fade {
  0%, 100% { opacity: 0.9; }
  50%       { opacity: 0.3; }
}

/* ===== HEADER ===== */
.header-premium {
  background: linear-gradient(135deg, #d81b60, #ad1457);
  padding: 40px 20px;
  text-align: center;
  color: white;
}

.logo {
  font-size: 34px;
  letter-spacing: 3px;
}

.logo span {
  display: block;
  font-size: 14px;
  opacity: 0.8;
}

/* LAYOUT */
.container {
  display: flex;
  padding: 20px;
  gap: 20px;
}

/* VIDEO */
.video {
  flex: 2;
  position: relative;
}

.video video {
  width: 100%;
  height: 420px;
  object-fit: cover;
  border-radius: 15px;
}

/* BOTÃO SOM */
.sound-btn {
  position: absolute;
  bottom: 20px;
  left: 20px;
  background: #d81b60;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 50px;
  cursor: pointer;
}

/* SIDEBAR */
.sidebar {
  flex: 1;
  background: white;
  padding: 20px;
  border-radius: 15px;
}

/* BOTÕES */
.tabs button {
  width: 100%;
  padding: 14px;
  margin-bottom: 10px;
  border: none;
  background: linear-gradient(135deg, #d81b60, #ad1457);
  color: white;
  border-radius: 10px;
  cursor: pointer;
}

/* CONTEÚDO */
.content {
  margin-top: 15px;
  padding: 15px;
  background: #fff;
  border-radius: 10px;
}

/* CARDS */
.card {
  padding: 12px;
  margin-bottom: 8px;
  border-radius: 10px;
  background: #fce4ec;
  cursor: pointer;
}

/* FOOTER */
footer {
  background: linear-gradient(135deg, #d81b60, #ad1457);
  color: white;
  text-align: center;
  padding: 15px;
}

/* RESPONSIVO */
@media (max-width: 768px) {
  .container { flex-direction: column; }
  .intro-name { font-size: 28px; letter-spacing: 4px; }
  .intro-line { width: 32px; }
}
</style>
</head>

<body>

<!-- ===== INTRO ===== -->
<div class="intro" id="intro" onclick="fecharIntro()">

  <div class="intro-ring"></div>
  <div class="intro-ring"></div>
  <div class="intro-ring"></div>
  <div class="intro-floor"></div>
  <div class="intro-glow"></div>
  <div class="intro-particles" id="introParticles"></div>

  <div class="intro-logo">
    <div class="intro-studio">Studio</div>
    <div class="intro-name-row">
      <div class="intro-line"></div>
      <div class="intro-name">Julie Barroso</div>
      <div class="intro-line"></div>
    </div>
    <div class="intro-tagline">Extensão de Cílios</div>
    <div class="intro-divider"></div>
  </div>

  <div class="intro-tap">
    <div class="intro-tap-btn">Toque para entrar</div>
    <div class="intro-tap-arrow">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </div>

</div>

<!-- ===== SITE ===== -->
<header class="header-premium">
  <div class="logo">
    <span>Studio</span>
    Julie Barroso
  </div>
</header>

<div class="container">

  <div class="video">
    <video id="videoPlayer" autoplay muted loop controls>
      <source src="apresentacao.mp4" type="video/mp4">
    </video>
    <button class="sound-btn" onclick="toggleSound()">🔊</button>
  </div>

  <div class="sidebar">
    <div class="tabs">
      <button onclick="showTab(1)">Sobre</button>
      <button onclick="showTab(2)">Cílios</button>
      <button onclick="showTab(3)">Localização</button>
    </div>
    <div class="content" id="content">
      Clique em uma opção 💖
    </div>
  </div>

</div>

<footer>
  © Studio Julie Barroso • Extensão de Cílios 💖
</footer>

<script>
// ---- PARTÍCULAS DA INTRO ----
(function() {
  const container = document.getElementById('introParticles');
  const cores = [
    'rgba(255,180,220,0.9)',
    'rgba(255,140,200,0.8)',
    'rgba(255,210,235,0.7)',
    'rgba(216,27,96,0.6)',
    'rgba(255,255,255,0.5)',
    'rgba(255,160,210,0.75)',
  ];
  for (let i = 0; i < 80; i++) {
    const p = document.createElement('div');
    p.className = 'intro-particle';
    const size   = Math.random() * 4 + 1;
    const cor    = cores[Math.floor(Math.random() * cores.length)];
    const duracao = Math.random() * 10 + 6;
    const delay  = Math.random() * 12;
    const left   = Math.random() * 100;
    const bottom = Math.random() * 30;
    p.style.cssText =
      'left:'              + left    + '%;'  +
      'bottom:'            + bottom  + 'px;' +
      'width:'             + size    + 'px;' +
      'height:'            + size    + 'px;' +
      'background:'        + cor     + ';'   +
      'animation-duration:'+ duracao + 's;'  +
      'animation-delay:'   + delay   + 's;';
    container.appendChild(p);
  }
})();

// ---- FECHAR INTRO ----
function fecharIntro() {
  const intro = document.getElementById('intro');
  intro.classList.add('hide');
  setTimeout(function() {
    intro.style.display = 'none';
  }, 1000);
}

// ---- SOM DO VÍDEO ----
function toggleSound() {
  const video = document.getElementById('videoPlayer');
  video.muted = !video.muted;
}

// ---- ABAS ----
function showTab(tab) {
  const content = document.getElementById('content');

  if (tab === 1) {
    content.innerHTML = '<h3>Sobre</h3><p>Especialistas em extensão de cílios, trazendo elegância e autoestima.</p>';
  }

  if (tab === 2) {
    const nomes = ['Clássico','Volume Russo','Híbrido','Mega Volume','Fox Eyes','Lash Lift'];
    let lista = '<h3>Serviços</h3>';
    nomes.forEach(function(n) {
      lista += '<div class="card" onclick="detalhe(\'' + n + '\')">✨ ' + n + '</div>';
    });
    content.innerHTML = lista;
  }

  if (tab === 3) {
    content.innerHTML = '<iframe src="https://maps.google.com/maps?q=Studio%20Julie%20Barroso&output=embed" width="100%" height="200"></iframe>';
  }
}

function detalhe(nome) {
  const content = document.getElementById('content');
  content.innerHTML =
    '<h3>' + nome + '</h3>' +
    '<p>Técnica profissional para valorizar seu olhar com sofisticação.</p>' +
    '<button onclick="showTab(2)">Voltar</button>';
}
</script>

</body>
</html>
