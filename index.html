<style>
* { box-sizing: border-box; }

:root {
  --rose-950:#2a101f;
  --rose-900:#4f1838;
  --rose-800:#9d2f68;
  --rose-700:#d94782;
  --rose-600:#ee5f97;
  --rose-500:#f77dac;
  --rose-300:#ffc1d9;
  --rose-200:#ffd8e8;
  --rose-100:#fff0f6;
  --baby-rose:#ffeaf3;
  --baby-rose-soft:#fff6fa;
}

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ffffff, var(--rose-100));
  color:var(--rose-950);
  overflow-x:hidden;
}

/* ===== INTRO ===== */
.intro {
  position: fixed; inset: 0;
  background:
    radial-gradient(circle at 50% 34%, rgba(255,216,232,.68) 0%, rgba(255,193,217,.7) 26%, transparent 50%),
    radial-gradient(circle at 18% 18%, rgba(255,216,232,.88) 0%, transparent 32%),
    radial-gradient(circle at 82% 76%, rgba(247,125,172,.5) 0%, transparent 40%),
    linear-gradient(145deg, #ffe1ec 0%, #ffc7dc 48%, #f7a6c7 100%);
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  color: var(--rose-800); z-index: 9999; overflow: hidden;
  cursor: pointer;
  transition: opacity 1.1s ease, transform 1.1s ease;
}
.intro.hide { opacity: 0; transform: scale(1.04); pointer-events: none; }

.intro-ring {
  position: absolute; border-radius: 50%;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
}
.intro-ring:nth-child(1) { width:360px;height:360px;border:.8px solid rgba(238,95,151,.24);animation:ring-pulse 5s ease-in-out infinite 0s; }
.intro-ring:nth-child(2) { width:540px;height:540px;border:.5px solid rgba(247,125,172,.28);animation:ring-pulse 5s ease-in-out infinite 1s; }
.intro-ring:nth-child(3) { width:720px;height:720px;border:.5px solid rgba(255,193,217,.34);animation:ring-pulse 5s ease-in-out infinite 2s; }
@keyframes ring-pulse {
  0%,100%{opacity:.4;transform:translate(-50%,-50%) scale(1);}
  50%{opacity:1;transform:translate(-50%,-50%) scale(1.025);}
}

.intro-floor {
  position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:500px;height:120px;
  background:radial-gradient(ellipse at center bottom,rgba(238,95,151,.32) 0%,transparent 70%);
  pointer-events:none;
}

.intro-glow {
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:280px;height:280px;
  background:radial-gradient(ellipse at center,rgba(255,193,217,.42) 0%,rgba(238,95,151,.24) 48%,transparent 74%);
  border-radius:50%;animation:glow-breathe 4.5s ease-in-out infinite;pointer-events:none;
}
@keyframes glow-breathe {
  0%,100%{opacity:.5;transform:translate(-50%,-50%) scale(1);}
  50%{opacity:1;transform:translate(-50%,-50%) scale(1.15);}
}

.intro-particles{position:absolute;inset:0;pointer-events:none;filter:blur(.15px);}
.intro-particle{
  position:absolute;
  border-radius:50%;
  opacity:0;
  box-shadow:0 0 14px rgba(255,214,232,.2);
  animation:particle-rise linear infinite;
}
@keyframes particle-rise {
  0%{opacity:0;transform:translate3d(0,0,0) scale(.92);}
  12%{opacity:var(--particle-opacity,.9);}
  55%{opacity:calc(var(--particle-opacity,.9) * .82);}
  100%{opacity:0;transform:translate3d(var(--drift-x,0px),-104vh,0) scale(var(--scale-end,.3));}
}

.intro-logo{position:relative;z-index:4;text-align:center;display:flex;flex-direction:column;align-items:center;margin-bottom:44px;}
.intro-studio{font-size:11px;letter-spacing:10px;color:rgba(112,34,74,.78);text-transform:uppercase;margin-bottom:14px;font-weight:500;}
.intro-name-row{display:flex;align-items:center;gap:22px;}
.intro-line{width:50px;height:.5px;background:rgba(238,95,151,.34);flex-shrink:0;}
.intro-name{font-family:Georgia,serif;font-size:44px;color:var(--rose-800);font-weight:normal;letter-spacing:5.5px;white-space:nowrap;text-shadow:0 10px 34px rgba(238,95,151,.2);}
.intro-tagline{font-size:10px;letter-spacing:7px;color:rgba(112,34,74,.76);text-transform:uppercase;margin-top:16px;font-weight:500;}
.intro-divider{width:36px;height:.5px;background:rgba(247,125,172,.5);margin-top:16px;}

.intro-tap{position:relative;z-index:4;display:flex;flex-direction:column;align-items:center;gap:16px;}
.intro-tap-btn{
  font-size:11px;letter-spacing:5px;color:rgba(79,24,56,.94);text-transform:uppercase;font-weight:600;
  padding:16px 48px;border:1px solid rgba(247,125,172,.34);border-radius:60px;
  background:linear-gradient(135deg,rgba(255,246,250,.8),rgba(255,193,217,.76));
  animation:ripple-pulse 2.2s ease-out infinite;white-space:nowrap;
  box-shadow:0 18px 42px rgba(238,95,151,.18);
  transition:background .3s,border-color .3s,transform .3s;
}
.intro-tap-btn:hover{background:linear-gradient(135deg,#fff,rgba(255,193,217,.8));border-color:rgba(238,95,151,.48);transform:translateY(-2px);}
@keyframes ripple-pulse{
  0%{box-shadow:0 18px 42px rgba(238,95,151,.18),0 0 0 0 rgba(247,125,172,.32);}
  65%{box-shadow:0 0 0 18px rgba(247,125,172,0);}
  100%{box-shadow:0 18px 42px rgba(238,95,151,.18),0 0 0 0 rgba(247,125,172,0);}
}
.intro-tap-arrow{display:flex;flex-direction:column;align-items:center;gap:4px;animation:arrow-drop 1.6s ease-in-out infinite;}
.intro-tap-arrow span{display:block;width:10px;height:10px;border-right:1.5px solid rgba(217,71,130,.52);border-bottom:1.5px solid rgba(217,71,130,.52);transform:rotate(45deg);animation:arrow-fade 1.6s ease-in-out infinite;}
.intro-tap-arrow span:nth-child(2){animation-delay:.2s;opacity:.5;}
.intro-tap-arrow span:nth-child(3){animation-delay:.4s;opacity:.25;}
@keyframes arrow-drop{0%,100%{transform:translateY(0);}50%{transform:translateY(6px);}}
@keyframes arrow-fade{0%,100%{opacity:.9;}50%{opacity:.3;}}

/* ===== HEADER PREMIUM ===== */
.header-premium {
  background: linear-gradient(135deg, var(--rose-800) 0%, var(--rose-600) 52%, var(--rose-800) 100%);
  padding: 36px 20px 32px;
  text-align: center; color: white;
  position: relative; overflow: hidden;
}
.header-premium::before {
  content:"";position:absolute;inset:0;
  background:
    radial-gradient(ellipse at 20% 50%,rgba(255,216,232,.22) 0%,transparent 60%),
    radial-gradient(ellipse at 80% 50%,rgba(255,216,232,.18) 0%,transparent 60%);
}
.logo-premium{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;}
.logo-studio-tag{font-size:10px;letter-spacing:9px;color:rgba(255,200,230,.65);text-transform:uppercase;margin-bottom:10px;}
.logo-name-row{display:flex;align-items:center;gap:18px;}
.logo-deco-line{flex:1;max-width:80px;height:.5px;background:linear-gradient(90deg,transparent,rgba(255,180,220,.7),transparent);}
.logo-main-name{
  font-family:Georgia,'Times New Roman',serif;
  font-size:36px;font-weight:normal;letter-spacing:7px;color:#fff;white-space:nowrap;
  text-shadow:0 0 30px rgba(255,193,217,.44),0 0 60px rgba(247,125,172,.26);
}
.logo-diamonds{display:flex;align-items:center;gap:8px;margin-top:10px;}
.logo-diamond{width:5px;height:5px;background:rgba(255,180,220,.6);transform:rotate(45deg);}
.logo-diamond.big{width:7px;height:7px;background:rgba(255,150,200,.8);}
.logo-thin-line{width:120px;height:.5px;background:rgba(255,150,200,.35);}
.logo-tagline-bottom{font-size:9px;letter-spacing:6px;color:rgba(255,180,220,.5);text-transform:uppercase;margin-top:10px;}

/* ===== LAYOUT ===== */
.container{
  display:flex;
  gap:20px;
  width:min(100%,1280px);
  margin:0 auto;
  padding:24px 20px 28px;
}

.video{flex:1.35;display:flex;flex-direction:column;gap:14px;min-width:0;}
.video-frame{
  position:relative;
  overflow:hidden;
  aspect-ratio:16 / 9;
  border-radius:28px;
  background:var(--rose-950);
  box-shadow:none;
}
.video-frame video,
.video-frame iframe{
  display:block;
  width:100%;
  height:100%;
  border-radius:22px;
  background:var(--rose-950);
}
.video-frame video[hidden],
.video-frame iframe[hidden]{
  display:none !important;
}
.video-frame video{object-fit:cover;}
.video-frame iframe{border:none;}
.video-frame.is-drive-preview iframe{
  height:100%;
  border-radius:20px;
}
.video-frame.is-direct-video video{
  border-radius:22px;
}
.sidebar{
  flex:1;min-width:320px;
  background:rgba(255,255,255,.92);
  padding:24px;border-radius:28px;
  box-shadow:0 18px 45px rgba(157,47,104,.08);
  border:1px solid rgba(255,210,230,.75);
  backdrop-filter:blur(10px);
}
.tabs{display:grid;gap:12px;}
.tab-btn{
  width:100%;padding:14px 16px;border:none;border-radius:18px;
  background:linear-gradient(145deg,#fff,var(--rose-100));
  color:var(--rose-800);cursor:pointer;
  display:flex;align-items:center;justify-content:space-between;gap:14px;
  box-shadow:0 10px 25px rgba(157,47,104,.08);
  border:1px solid rgba(238,95,151,.14);
  transition:transform .22s ease,box-shadow .22s ease,border-color .22s ease,background .22s ease,color .22s ease;
}
.tab-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 16px 30px rgba(238,95,151,.16);
  border-color:rgba(238,95,151,.32);
}
.tab-btn.active{
  color:#fff;
  background:linear-gradient(135deg,var(--rose-800) 0%,var(--rose-600) 55%,var(--rose-500) 100%);
  border-color:transparent;
  box-shadow:0 18px 34px rgba(238,95,151,.26);
}
.tab-btn-left{display:flex;align-items:center;gap:12px;text-align:left;}
.tab-btn-icon{
  width:40px;height:40px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,rgba(238,95,151,.18),rgba(247,125,172,.1));
  color:var(--rose-700);font-weight:700;letter-spacing:1px;
  flex-shrink:0;
}
.tab-btn.active .tab-btn-icon{
  background:rgba(255,255,255,.14);
  color:#fff;
}
.tab-btn-label{display:flex;flex-direction:column;gap:3px;}
.tab-btn-label strong{
  font-size:15px;font-weight:600;letter-spacing:.4px;
}
.tab-btn-label span{
  font-size:11px;letter-spacing:.4px;color:rgba(157,47,104,.66);
}
.tab-btn.active .tab-btn-label span{color:rgba(255,235,243,.82);}
.tab-btn-arrow{
  font-size:22px;line-height:1;color:rgba(157,47,104,.38);
  transition:transform .22s ease,color .22s ease;
}
.tab-btn:hover .tab-btn-arrow,
.tab-btn.active .tab-btn-arrow{
  transform:translateX(3px);
}
.tab-btn.active .tab-btn-arrow{color:rgba(255,255,255,.92);}

.content{
  margin-top:18px;
  padding:18px;
  background:rgba(255,255,255,.92);
  border-radius:20px;
  min-height:220px;
}
.content iframe{
  width:100%;
  max-width:100%;
  border:none;
  border-radius:16px;
}

/* ===== CARDS ===== */
.card{
  display:flex;align-items:center;gap:12px;
  padding:12px;margin-bottom:10px;border-radius:12px;
  background:var(--rose-100);cursor:pointer;
  transition:transform .2s,box-shadow .2s;
  border:1px solid rgba(238,95,151,.12);
}
.card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(238,95,151,.17);}
.card-thumb{
  width:52px;height:52px;border-radius:10px;flex-shrink:0;
  background:linear-gradient(135deg,var(--rose-600),var(--rose-700));
  display:flex;align-items:center;justify-content:center;font-size:22px;
  overflow:hidden;
}
.card-thumb img{width:100%;height:100%;object-fit:cover;border-radius:10px;}
.card-info{display:flex;flex-direction:column;gap:3px;}
.card-title{font-size:14px;font-weight:600;color:var(--rose-800);}
.card-desc-mini{font-size:11px;color:var(--rose-700);opacity:.78;}

/* ===== DETALHE ===== */
.detalhe-wrap{display:flex;flex-direction:column;}
.detalhe-img-wrap{
  width:100%;height:200px;border-radius:12px;overflow:hidden;
  background:linear-gradient(135deg,var(--rose-800),var(--rose-500));
  display:flex;align-items:center;justify-content:center;
  font-size:64px;margin-bottom:16px;position:relative;
}
.detalhe-img-wrap img{width:100%;height:100%;object-fit:cover;}
.detalhe-img-label{
  position:absolute;bottom:10px;left:12px;
  font-size:11px;letter-spacing:3px;color:rgba(255,255,255,.7);text-transform:uppercase;
}
.detalhe-nome{font-family:Georgia,serif;font-size:22px;font-weight:normal;color:var(--rose-800);letter-spacing:2px;margin-bottom:8px;}
.detalhe-linha{width:40px;height:1.5px;background:linear-gradient(90deg,var(--rose-500),var(--rose-700));border-radius:2px;margin-bottom:12px;}
.detalhe-texto{font-size:13px;line-height:1.7;color:#555;margin-bottom:16px;}
.detalhe-info{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.detalhe-badge{
  font-size:11px;letter-spacing:1px;padding:6px 12px;border-radius:20px;
  background:var(--rose-100);color:var(--rose-700);border:1px solid rgba(238,95,151,.22);
}
.btn-voltar{
  background:none;border:1px solid rgba(238,95,151,.44);color:var(--rose-600);
  padding:11px 20px;border-radius:8px;cursor:pointer;font-size:13px;
  transition:background .2s;width:100%;margin-top:4px;
}
.btn-voltar:hover{background:var(--rose-100);}

/* ===== FOOTER ===== */
footer{
  background:linear-gradient(135deg,var(--rose-600),var(--rose-700));
  color:white;text-align:center;padding:15px 18px;
  font-size:13px;
}

/* ===== RESPONSIVO ===== */
@media(max-width:1024px){
  .container{
    flex-direction:column;
    padding:18px 16px 24px;
    gap:16px;
  }
  .video,
  .sidebar{
    width:100%;
  }
  .sidebar{
    min-width:0;
  }
  .video-frame video,
  .video-frame iframe{
    height:360px;
  }
}

@media(max-width:768px){
  .intro{
    padding:24px 18px;
  }
  .intro-ring:nth-child(1){width:250px;height:250px;}
  .intro-ring:nth-child(2){width:340px;height:340px;}
  .intro-ring:nth-child(3){width:430px;height:430px;}
  .intro-floor{width:320px;height:90px;}

  .intro-name-row{
    gap:14px;

  }

  }

    border-radius:18px;
  }
  .content h3{
    font-size:21px !important;

  }

    line-height:1.75 !important;
  }

    padding:14px;

  }

    width:56px;

    font-size:15px;
  }

    font-size:12px;
  }
  .detalhe-img-wrap{
    height:220px;
    border-radius:16px;
    margin:0 0 16px;

  }

@media(max-width:480px){
  .intro{
    padding:22px 14px;
  }
  .intro-line,

  }

  }

  }

  }

  }
  .detalhe-info{
    gap:6px;
  }
}
</style>
</head>
<body>

<!-- INTRO -->
<div class="intro" id="intro" onclick="fecharIntro()">
  <div class="intro-ring"></div>
  <div class="intro-ring"></div>
  <div class="intro-ring"></div>
  <div class="intro-floor"></div>
  <div class="intro-glow"></div>
  <div class="intro-particles" id="introParticles"></div>
  <div class="intro-logo">
    <div class="intro-studio">Studio</div>
    <div class="intro-name-row">
      <div class="intro-line"></div>
      <div class="intro-name">Julie Barroso</div>
      <div class="intro-line"></div>
    </div>
    <div class="intro-tagline">Extensão de Cílios</div>
    <div class="intro-divider"></div>
  </div>
  <div class="intro-tap">
    <div class="intro-tap-btn">Toque para entrar</div>
    <div class="intro-tap-arrow"><span></span><span></span><span></span></div>
  </div>
</div>

<!-- HEADER -->
<header class="header-premium">
  <div class="logo-premium">
    <div class="logo-studio-tag">Studio</div>
    <div class="logo-name-row">
      <div class="logo-deco-line"></div>
      <div class="logo-main-name">Julie Barroso</div>

/* PARTÍCULAS */
(function(){
  var c = document.getElementById('introParticles');
  var cores = ['rgba(255,193,217,.92)','rgba(247,125,172,.86)','rgba(255,216,232,.74)','rgba(238,95,151,.66)','rgba(255,255,255,.5)','rgba(255,172,206,.78)'];
  for(var i=0;i<140;i++){
    var p=document.createElement('div'); p.className='intro-particle';
    var tier=i%3;
    var s=tier===0 ? (Math.random()*1.8+1.2) : tier===1 ? (Math.random()*2.4+2.2) : (Math.random()*3+3.4);
    var drift=(Math.random()*36-18).toFixed(2)+'px';
    var opacity=(tier===0 ? (Math.random()*0.22+0.3) : tier===1 ? (Math.random()*0.18+0.46) : (Math.random()*0.16+0.58)).toFixed(2);
    var duration=(Math.random()*7 + (tier===0 ? 12 : tier===1 ? 10 : 8)).toFixed(2)+'s';
    var delay=(Math.random()*14).toFixed(2)+'s';
    var bottom=(Math.random()*20).toFixed(2)+'px';
    var scaleEnd=(Math.random()*0.28+0.24).toFixed(2);
    p.style.cssText='left:'+(Math.random()*100).toFixed(2)+'%;bottom:'+bottom+';width:'+s.toFixed(2)+'px;height:'+s.toFixed(2)+'px;background:'+cores[Math.floor(Math.random()*cores.length)]+';animation-duration:'+duration+';animation-delay:'+delay+';--drift-x:'+drift+';--particle-opacity:'+opacity+';--scale-end:'+scaleEnd+';';
    c.appendChild(p);
  }
})();

function getDriveFileId(link){
  if(!link) return '';
  var match = link.match(/\/file\/d\/([^\/]+)/);
  if(match && match[1]) return match[1];

  match = link.match(/[?&]id=([^&]+)/);
  if(match && match[1]) return match[1];

  return '';
}

function isDriveLink(link){
  return /drive\.google\.com/i.test(link || '');
}

function shouldUseDrivePreviewFallback(){
  return !window.matchMedia('(max-width: 768px), (pointer: coarse)').matches;
}

function requestVideoPlayback(){
  var video=document.getElementById('videoPlayer');
  var playPromise;

  if(currentVideoMode!=='file' || video.hidden) return;

  video.muted=true;
  video.defaultMuted=true;
  playPromise=video.play();
  if(playPromise && typeof playPromise.catch==='function'){
    playPromise.catch(function(){});
  }
}

function showDrivePreview(fileId){
  var video=document.getElementById('videoPlayer');
  var source=document.getElementById('videoSource');
  var drivePlayer=document.getElementById('drivePlayer');
  var videoFrame=document.querySelector('.video-frame');

  currentVideoMode='drive';
  source.src='';
  video.pause();
  video.hidden=true;
  videoFrame.classList.remove('is-direct-video');
  videoFrame.classList.add('is-drive-preview');
  drivePlayer.src='https://drive.google.com/file/d/'+fileId+'/preview?autoplay=1';
  drivePlayer.hidden=false;
}

function showDirectVideo(src){
  var video=document.getElementById('videoPlayer');
  var source=document.getElementById('videoSource');
  var drivePlayer=document.getElementById('drivePlayer');
  var videoFrame=document.querySelector('.video-frame');
  var playPromise;

  currentVideoMode='file';
  if(driveFallbackTimer){
    clearTimeout(driveFallbackTimer);
    driveFallbackTimer=null;
  }

  drivePlayer.src='';
  drivePlayer.hidden=true;
  videoFrame.classList.remove('is-drive-preview');
  videoFrame.classList.add('is-direct-video');
  video.hidden=false;
  source.src=src;
  video.load();
  playPromise=video.play();
  if(playPromise && typeof playPromise.catch==='function'){
    playPromise.catch(function(){});
  }
}

function applyVideoSource(){
  var link=(VIDEO_URL || '').trim();
  var fileId=getDriveFileId(link);
  var directDriveUrl;
  var driveThumbnailUrl;

  if(!link) return;

  if(isDriveLink(link) && fileId){
    directDriveUrl='https://drive.google.com/uc?export=download&id='+fileId;
    driveThumbnailUrl='https://drive.google.com/thumbnail?id='+fileId+'&sz=w1600';
    document.getElementById('videoPlayer').poster=driveThumbnailUrl;
    showDirectVideo(directDriveUrl);
    if(shouldUseDrivePreviewFallback()){
      driveFallbackTimer=setTimeout(function(){
        var video=document.getElementById('videoPlayer');
        if(currentVideoMode==='file' && video.readyState<2){
          showDrivePreview(fileId);
        }
      },7000);
    }
    return;
  }

  document.getElementById('videoPlayer').removeAttribute('poster');
  showDirectVideo(link);
}

function fecharIntro(){
  var el=document.getElementById('intro');
  requestVideoPlayback();
  el.classList.add('hide');
  setTimeout(function(){el.style.display='none';},1100);
}

function updateActiveTab(tab){
  var buttons=document.querySelectorAll('.tab-btn');
  buttons.forEach(function(btn){
    var active=Number(btn.getAttribute('data-tab'))===tab;
    btn.classList.toggle('active',active);
    btn.setAttribute('aria-pressed',active ? 'true' : 'false');
  });
}

document.getElementById('videoPlayer').addEventListener('loadeddata',function(){
  if(driveFallbackTimer){
    clearTimeout(driveFallbackTimer);
    driveFallbackTimer=null;

});

document.getElementById('videoPlayer').addEventListener('error',function(){
  var fileId=getDriveFileId((VIDEO_URL || '').trim());

});
