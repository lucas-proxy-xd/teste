<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio Julie Barroso</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ffffff, #fce4ec);
}

/* ===== INTRO ===== */
.intro {
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at 50% 35%, #3d0028 0%, #1a0012 50%, #080005 100%);
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  color: white; z-index: 9999; overflow: hidden;
  cursor: pointer;
  transition: opacity 1.1s ease, transform 1.1s ease;
}
.intro.hide { opacity: 0; transform: scale(1.04); pointer-events: none; }

.intro-ring {
  position: absolute; border-radius: 50%;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
}
.intro-ring:nth-child(1) { width:360px;height:360px;border:.8px solid rgba(216,27,96,.22);animation:ring-pulse 5s ease-in-out infinite 0s; }
.intro-ring:nth-child(2) { width:540px;height:540px;border:.5px solid rgba(216,27,96,.12);animation:ring-pulse 5s ease-in-out infinite 1s; }
.intro-ring:nth-child(3) { width:720px;height:720px;border:.5px solid rgba(216,27,96,.06);animation:ring-pulse 5s ease-in-out infinite 2s; }
@keyframes ring-pulse {
  0%,100%{opacity:.4;transform:translate(-50%,-50%) scale(1);}
  50%{opacity:1;transform:translate(-50%,-50%) scale(1.025);}
}

.intro-floor {
  position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:500px;height:120px;
  background:radial-gradient(ellipse at center bottom,rgba(216,27,96,.35) 0%,transparent 70%);
  pointer-events:none;
}

.intro-glow {
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:280px;height:280px;
  background:radial-gradient(ellipse at center,rgba(216,27,96,.08) 0%,transparent 70%);
  border-radius:50%;animation:glow-breathe 4.5s ease-in-out infinite;pointer-events:none;
}
@keyframes glow-breathe {
  0%,100%{opacity:.5;transform:translate(-50%,-50%) scale(1);}
  50%{opacity:1;transform:translate(-50%,-50%) scale(1.15);}
}

.intro-particles{position:absolute;inset:0;pointer-events:none;}
.intro-particle{position:absolute;border-radius:50%;animation:particle-rise linear infinite;}
@keyframes particle-rise {
  0%{opacity:0;transform:translateY(0) scale(1);}
  10%{opacity:1;}80%{opacity:.5;}
  100%{opacity:0;transform:translateY(-100vh) scale(.2);}
}

.intro-logo{position:relative;z-index:4;text-align:center;display:flex;flex-direction:column;align-items:center;margin-bottom:44px;}
.intro-studio{font-size:11px;letter-spacing:10px;color:rgba(255,200,230,.6);text-transform:uppercase;margin-bottom:14px;}
.intro-name-row{display:flex;align-items:center;gap:22px;}
.intro-line{width:50px;height:.5px;background:rgba(255,150,200,.5);flex-shrink:0;}
.intro-name{font-family:Georgia,serif;font-size:40px;color:#fff;font-weight:normal;letter-spacing:6px;white-space:nowrap;}
.intro-tagline{font-size:10px;letter-spacing:7px;color:rgba(255,160,210,.45);text-transform:uppercase;margin-top:16px;}
.intro-divider{width:36px;height:.5px;background:rgba(216,27,96,.45);margin-top:16px;}

.intro-tap{position:relative;z-index:4;display:flex;flex-direction:column;align-items:center;gap:16px;}
.intro-tap-btn{
  font-size:11px;letter-spacing:5px;color:#fff;text-transform:uppercase;
  padding:16px 48px;border:1px solid rgba(216,27,96,.7);border-radius:60px;
  background:linear-gradient(135deg,rgba(216,27,96,.28),rgba(173,20,87,.22));
  animation:ripple-pulse 2.2s ease-out infinite;white-space:nowrap;
  transition:background .3s,border-color .3s;
}
.intro-tap-btn:hover{background:linear-gradient(135deg,rgba(216,27,96,.5),rgba(173,20,87,.4));border-color:rgba(255,100,170,.9);}
@keyframes ripple-pulse{
  0%{box-shadow:0 0 0 0 rgba(216,27,96,.55);}
  65%{box-shadow:0 0 0 18px rgba(216,27,96,0);}
  100%{box-shadow:0 0 0 0 rgba(216,27,96,0);}
}
.intro-tap-arrow{display:flex;flex-direction:column;align-items:center;gap:4px;animation:arrow-drop 1.6s ease-in-out infinite;}
.intro-tap-arrow span{display:block;width:10px;height:10px;border-right:1.5px solid rgba(255,140,200,.7);border-bottom:1.5px solid rgba(255,140,200,.7);transform:rotate(45deg);animation:arrow-fade 1.6s ease-in-out infinite;}
.intro-tap-arrow span:nth-child(2){animation-delay:.2s;opacity:.5;}
.intro-tap-arrow span:nth-child(3){animation-delay:.4s;opacity:.25;}
@keyframes arrow-drop{0%,100%{transform:translateY(0);}50%{transform:translateY(6px);}}
@keyframes arrow-fade{0%,100%{opacity:.9;}50%{opacity:.3;}}

/* ===== HEADER PREMIUM ===== */
.header-premium {
  background: linear-gradient(135deg, #6a0d3b 0%, #ad1457 50%, #6a0d3b 100%);
  padding: 36px 20px 32px;
  text-align: center; color: white;
  position: relative; overflow: hidden;
}
.header-premium::before {
  content:"";position:absolute;inset:0;
  background:
    radial-gradient(ellipse at 20% 50%,rgba(255,150,200,.12) 0%,transparent 60%),
    radial-gradient(ellipse at 80% 50%,rgba(255,150,200,.10) 0%,transparent 60%);
}
.logo-premium{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;}
.logo-studio-tag{font-size:10px;letter-spacing:9px;color:rgba(255,200,230,.65);text-transform:uppercase;margin-bottom:10px;}
.logo-name-row{display:flex;align-items:center;gap:18px;}
.logo-deco-line{flex:1;max-width:80px;height:.5px;background:linear-gradient(90deg,transparent,rgba(255,180,220,.7),transparent);}
.logo-main-name{
  font-family:Georgia,'Times New Roman',serif;
  font-size:36px;font-weight:normal;letter-spacing:7px;color:#fff;white-space:nowrap;
  text-shadow:0 0 30px rgba(255,100,180,.4),0 0 60px rgba(216,27,96,.2);
}
.logo-diamonds{display:flex;align-items:center;gap:8px;margin-top:10px;}
.logo-diamond{width:5px;height:5px;background:rgba(255,180,220,.6);transform:rotate(45deg);}
.logo-diamond.big{width:7px;height:7px;background:rgba(255,150,200,.8);}
.logo-thin-line{width:120px;height:.5px;background:rgba(255,150,200,.35);}
.logo-tagline-bottom{font-size:9px;letter-spacing:6px;color:rgba(255,180,220,.5);text-transform:uppercase;margin-top:10px;}

/* ===== LAYOUT ===== */
.container{display:flex;padding:20px;gap:20px;}

.video{flex:2;position:relative;}
.video video{width:100%;height:420px;object-fit:cover;border-radius:15px;}
.sound-btn{
  position:absolute;top:18px;right:18px;z-index:2;
  display:inline-flex;align-items:center;gap:10px;
  border:none;border-radius:999px;
  padding:10px 16px 10px 10px;cursor:pointer;
  color:white;
  background:linear-gradient(135deg,rgba(67,17,40,.92),rgba(147,35,87,.88));
  box-shadow:0 18px 34px rgba(106,13,59,.28);
  backdrop-filter:blur(10px);
  transition:transform .25s ease,box-shadow .25s ease,background .25s ease;
}
.sound-btn::before{
  content:"";position:absolute;inset:1px;border-radius:999px;
  border:1px solid rgba(255,255,255,.18);pointer-events:none;
}
.sound-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 22px 38px rgba(106,13,59,.35);
}
.sound-btn.is-on{
  background:linear-gradient(135deg,rgba(216,27,96,.95),rgba(173,20,87,.90));
}
.sound-btn-icon{
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.14);
  font-size:17px;font-weight:700;flex-shrink:0;
}
.sound-btn-text{
  display:flex;flex-direction:column;align-items:flex-start;
  line-height:1.1;
}
.sound-btn-text strong{
  font-size:12px;font-weight:600;letter-spacing:.7px;text-transform:uppercase;
}
.sound-btn-text small{
  font-size:10px;letter-spacing:.5px;color:rgba(255,240,246,.82);
}

.sidebar{flex:1;background:white;padding:20px;border-radius:15px;}
.tabs{display:grid;gap:12px;}
.tab-btn{
  width:100%;padding:14px 16px;border:none;border-radius:18px;
  background:linear-gradient(145deg,#fff,#fff7fa);
  color:#6a0d3b;cursor:pointer;
  display:flex;align-items:center;justify-content:space-between;gap:14px;
  box-shadow:0 10px 25px rgba(106,13,59,.08);
  border:1px solid rgba(216,27,96,.12);
  transition:transform .22s ease,box-shadow .22s ease,border-color .22s ease,background .22s ease,color .22s ease;
}
.tab-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 16px 30px rgba(216,27,96,.14);
  border-color:rgba(216,27,96,.26);
}
.tab-btn.active{
  color:#fff;
  background:linear-gradient(135deg,#6a0d3b 0%,#ad1457 55%,#d81b60 100%);
  border-color:transparent;
  box-shadow:0 18px 34px rgba(173,20,87,.24);
}
.tab-btn-left{display:flex;align-items:center;gap:12px;text-align:left;}
.tab-btn-icon{
  width:40px;height:40px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,rgba(216,27,96,.18),rgba(173,20,87,.08));
  color:#ad1457;font-weight:700;letter-spacing:1px;
  flex-shrink:0;
}
.tab-btn.active .tab-btn-icon{
  background:rgba(255,255,255,.14);
  color:#fff;
}
.tab-btn-label{display:flex;flex-direction:column;gap:3px;}
.tab-btn-label strong{
  font-size:15px;font-weight:600;letter-spacing:.4px;
}
.tab-btn-label span{
  font-size:11px;letter-spacing:.4px;color:rgba(106,13,59,.66);
}
.tab-btn.active .tab-btn-label span{color:rgba(255,235,243,.82);}
.tab-btn-arrow{
  font-size:22px;line-height:1;color:rgba(106,13,59,.38);
  transition:transform .22s ease,color .22s ease;
}
.tab-btn:hover .tab-btn-arrow,
.tab-btn.active .tab-btn-arrow{
  transform:translateX(3px);
}
.tab-btn.active .tab-btn-arrow{color:rgba(255,255,255,.92);}

.content{margin-top:15px;padding:15px;background:#fff;border-radius:10px;}

/* ===== CARDS ===== */
.card{
  display:flex;align-items:center;gap:12px;
  padding:12px;margin-bottom:10px;border-radius:12px;
  background:#fce4ec;cursor:pointer;
  transition:transform .2s,box-shadow .2s;
  border:1px solid rgba(216,27,96,.1);
}
.card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(216,27,96,.15);}
.card-thumb{
  width:52px;height:52px;border-radius:10px;flex-shrink:0;
  background:linear-gradient(135deg,#d81b60,#ad1457);
  display:flex;align-items:center;justify-content:center;font-size:22px;
  overflow:hidden;
}
.card-thumb img{width:100%;height:100%;object-fit:cover;border-radius:10px;}
.card-info{display:flex;flex-direction:column;gap:3px;}
.card-title{font-size:14px;font-weight:600;color:#6a0d3b;}
.card-desc-mini{font-size:11px;color:#ad1457;opacity:.75;}

/* ===== DETALHE ===== */
.detalhe-wrap{display:flex;flex-direction:column;}
.detalhe-img-wrap{
  width:100%;height:200px;border-radius:12px;overflow:hidden;
  background:linear-gradient(135deg,#6a0d3b,#d81b60);
  display:flex;align-items:center;justify-content:center;
  font-size:64px;margin-bottom:16px;position:relative;
}
.detalhe-img-wrap img{width:100%;height:100%;object-fit:cover;}
.detalhe-img-label{
  position:absolute;bottom:10px;left:12px;
  font-size:11px;letter-spacing:3px;color:rgba(255,255,255,.7);text-transform:uppercase;
}
.detalhe-nome{font-family:Georgia,serif;font-size:22px;font-weight:normal;color:#6a0d3b;letter-spacing:2px;margin-bottom:8px;}
.detalhe-linha{width:40px;height:1.5px;background:linear-gradient(90deg,#d81b60,#ad1457);border-radius:2px;margin-bottom:12px;}
.detalhe-texto{font-size:13px;line-height:1.7;color:#555;margin-bottom:16px;}
.detalhe-info{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.detalhe-badge{
  font-size:11px;letter-spacing:1px;padding:6px 12px;border-radius:20px;
  background:#fce4ec;color:#ad1457;border:1px solid rgba(216,27,96,.2);
}
.btn-voltar{
  background:none;border:1px solid rgba(216,27,96,.4);color:#d81b60;
  padding:11px 20px;border-radius:8px;cursor:pointer;font-size:13px;
  transition:background .2s;width:100%;margin-top:4px;
}
.btn-voltar:hover{background:#fce4ec;}

/* ===== FOOTER ===== */
footer{background:linear-gradient(135deg,#d81b60,#ad1457);color:white;text-align:center;padding:15px;}

/* ===== RESPONSIVO ===== */
@media(max-width:768px){
  .container{flex-direction:column;}
  .intro-name{font-size:28px;letter-spacing:4px;}
  .intro-line{width:32px;}
  .logo-main-name{font-size:26px;letter-spacing:5px;}
  .logo-deco-line{max-width:40px;}
  .video video{height:240px;}
  .sound-btn{top:14px;right:14px;padding:9px 14px 9px 9px;}
  .sound-btn-icon{width:34px;height:34px;}
  .tab-btn{padding:13px 14px;}
  .detalhe-img-wrap{height:260px;border-radius:0;margin:-15px -15px 16px -15px;width:calc(100% + 30px);}
}
</style>
</head>
<body>

<!-- INTRO -->
<div class="intro" id="intro" onclick="fecharIntro()">
  <div class="intro-ring"></div>
  <div class="intro-ring"></div>
  <div class="intro-ring"></div>
  <div class="intro-floor"></div>
  <div class="intro-glow"></div>
  <div class="intro-particles" id="introParticles"></div>
  <div class="intro-logo">
    <div class="intro-studio">Studio</div>

      <div class="intro-line"></div>

</div>

<!-- HEADER -->
<header class="header-premium">
  <div class="logo-premium">
    <div class="logo-studio-tag">Studio</div>
    <div class="logo-name-row">
      <div class="logo-deco-line"></div>
      <div class="logo-main-name">Julie Barroso</div>
      <div class="logo-deco-line"></div>
    </div>
    <div class="logo-diamonds">
      <div class="logo-thin-line"></div>
      <div class="logo-diamond"></div>
      <div class="logo-diamond big"></div>
      <div class="logo-diamond"></div>
      <div class="logo-thin-line"></div>

</header>

<!-- SITE -->
<div class="container">
  <div class="video">
    <video id="videoPlayer" autoplay muted loop controls>
      <source src="apresentacao.mp4" type="video/mp4">
    </video>
    <button class="sound-btn is-muted" id="soundBtn" type="button" onclick="toggleSound()" aria-label="Ativar audio" aria-pressed="false">
      <span class="sound-btn-icon" id="soundIcon">&#9835;</span>
      <span class="sound-btn-text">
        <strong>Som do video</strong>
        <small id="soundState">Toque para ativar</small>
      </span>
    </button>
  </div>
  <div class="sidebar">
    <div class="tabs">
      <button class="tab-btn" type="button" data-tab="1" onclick="showTab(1)">
        <span class="tab-btn-left">
          <span class="tab-btn-icon">S</span>
          <span class="tab-btn-label">
            <strong>Sobre</strong>

          </span>
        </span>
        <span class="tab-btn-arrow">&rsaquo;</span>

      <button class="tab-btn" type="button" data-tab="2" onclick="showTab(2)">
        <span class="tab-btn-left">
          <span class="tab-btn-icon">C</span>
          <span class="tab-btn-label">
            <strong>Cilios</strong>

          </span>
        </span>
        <span class="tab-btn-arrow">&rsaquo;</span>
      </button>
      <button class="tab-btn" type="button" data-tab="3" onclick="showTab(3)">
        <span class="tab-btn-left">
          <span class="tab-btn-icon">L</span>
          <span class="tab-btn-label">
            <strong>Localizacao</strong>

          </span>
        </span>
        <span class="tab-btn-arrow">&rsaquo;</span>
      </button>
    </div>
    <div class="content" id="content">Clique em uma opção 💖</div>
  </div>
</div>

<footer>© Studio Julie Barroso • Extensão de Cílios 💖</footer>

<script>

  'Híbrido':      { imagem:'hibrido.jpg',       emoji:'💫',  resumo:'O melhor dos dois mundos',     duracao:'2h',   fixacao:'3–4 semanas', indicado:'Uso versátil',        descricao:'Combina fios clássicos e volume russo na mesma aplicação, gerando textura variada e um olhar sofisticado com profundidade. Versátil para qualquer ocasião.' },

  'Fox Eyes':     { imagem:'foxeyes.jpg',       emoji:'🦊',  resumo:'Efeito gatinho alongado',      duracao:'2h',   fixacao:'3–4 semanas', indicado:'Tendência atual',     descricao:'Técnica que alonga os cílios da extremidade externa dos olhos, criando o famoso efeito olho de raposa — sensual, moderno e muito elegante.' },
  'Lash Lift':    { imagem:'lashlift.jpg',      emoji:'🌙',  resumo:'Seus cílios naturais realçados', duracao:'1h', fixacao:'6–8 semanas', indicado:'Baixa manutenção',   descricao:'Procedimento que curva e levanta seus próprios cílios, sem extensões. Com opção de tingimento, o resultado é um olhar aberto e renovado por até 8 semanas.' }
};

/* PARTÍCULAS */
(function(){
  var c = document.getElementById('introParticles');
  var cores = ['rgba(255,180,220,.9)','rgba(255,140,200,.8)','rgba(255,210,235,.7)','rgba(216,27,96,.6)','rgba(255,255,255,.5)','rgba(255,160,210,.75)'];
  for(var i=0;i<80;i++){
    var p=document.createElement('div'); p.className='intro-particle';
    var s=Math.random()*4+1;
    p.style.cssText='left:'+(Math.random()*100)+'%;bottom:'+(Math.random()*30)+'px;width:'+s+'px;height:'+s+'px;background:'+cores[Math.floor(Math.random()*cores.length)]+';animation-duration:'+(Math.random()*10+6)+'s;animation-delay:'+(Math.random()*12)+'s;';
    c.appendChild(p);
  }
})();

function fecharIntro(){
  var el=document.getElementById('intro');
  el.classList.add('hide');
  setTimeout(function(){el.style.display='none';},1100);
}

function updateSoundButton(){
  var v=document.getElementById('videoPlayer');
  var btn=document.getElementById('soundBtn');
  var icon=document.getElementById('soundIcon');
  var state=document.getElementById('soundState');
  var muted=v.muted;

  btn.classList.toggle('is-muted',muted);
  btn.classList.toggle('is-on',!muted);
  btn.setAttribute('aria-label',muted ? 'Ativar audio' : 'Desativar audio');
  btn.setAttribute('aria-pressed',(!muted).toString());
  icon.innerHTML=muted ? '&#9835;' : '&#9834;';
  state.textContent=muted ? 'Toque para ativar' : 'Som ligado';
}

function toggleSound(){
  var v=document.getElementById('videoPlayer');
  v.muted=!v.muted;
  updateSoundButton();
}

function updateActiveTab(tab){
  var buttons=document.querySelectorAll('.tab-btn');
  buttons.forEach(function(btn){
    var active=Number(btn.getAttribute('data-tab'))===tab;
    btn.classList.toggle('active',active);
    btn.setAttribute('aria-pressed',active ? 'true' : 'false');
  });
}

function showTab(tab){
  var content=document.getElementById('content');
  updateActiveTab(tab);
  if(tab===1){
    content.innerHTML='<h3 style="color:#6a0d3b;font-family:Georgia,serif;font-weight:normal;letter-spacing:1px;margin-bottom:10px;">Sobre nós</h3><p style="color:#555;line-height:1.7;font-size:13px;">Especialistas em extensão de cílios, trazendo elegância e autoestima para cada cliente. Técnicas exclusivas, produtos premium e atendimento personalizado.</p>';
  }
  if(tab===2){
    var html='<h3 style="color:#6a0d3b;font-family:Georgia,serif;font-weight:normal;letter-spacing:1px;margin-bottom:12px;">Nossos serviços</h3>';
    Object.keys(proc).forEach(function(n){
      var thumbHtml = proc[n].imagem
        ? '<div class="card-thumb"><img src="'+proc[n].imagem+'" alt="'+n+'"></div>'
        : '<div class="card-thumb">'+proc[n].emoji+'</div>';
      html+='<div class="card" onclick="detalhe(\''+n+'\')">'+thumbHtml+'<div class="card-info"><div class="card-title">'+n+'</div><div class="card-desc-mini">'+proc[n].resumo+'</div></div></div>';
    });
    content.innerHTML=html;
  }
  if(tab===3){
    content.innerHTML='<h3 style="color:#6a0d3b;font-family:Georgia,serif;font-weight:normal;letter-spacing:1px;margin-bottom:12px;">Localização</h3><iframe src="https://maps.google.com/maps?q=Studio%20Julie%20Barroso&output=embed" width="100%" height="200" style="border-radius:10px;border:none;"></iframe>';
  }
}

function detalhe(nome){
  var p=proc[nome];
  var content=document.getElementById('content');
  var imgHtml=p.imagem
    ? '<img src="'+p.imagem+'" alt="'+nome+'">'
    : '<span style="font-size:64px">'+p.emoji+'</span>';
  content.innerHTML=
    '<div class="detalhe-wrap">'+
      '<div class="detalhe-img-wrap">'+imgHtml+'<div class="detalhe-img-label">Studio Julie Barroso</div></div>'+
      '<div class="detalhe-nome">'+nome+'</div>'+
      '<div class="detalhe-linha"></div>'+
      '<p class="detalhe-texto">'+p.descricao+'</p>'+
      '<div class="detalhe-info">'+
        '<div class="detalhe-badge">⏱ '+p.duracao+'</div>'+
        '<div class="detalhe-badge">📅 '+p.fixacao+'</div>'+
        '<div class="detalhe-badge">💡 '+p.indicado+'</div>'+
      '</div>'+
      '<button class="btn-voltar" onclick="showTab(2)">← Voltar aos serviços</button>'+
    '</div>';
  if(window.innerWidth<=768){
    setTimeout(function(){ content.scrollIntoView({behavior:'smooth',block:'start'}); },50);
  }
}

updateSoundButton();
</script>
</body>
</html>
