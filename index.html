<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio Julie Barroso</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ffffff, #fce4ec);
}

/* ===== INTRO PREMIUM ===== */
.intro {
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at center, #d81b60, #8e0f4a);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: white;
  z-index: 9999;
  animation: fadeOut 1s ease 4s forwards;
}

.eyes {
  display: flex;
  gap: 60px;
  margin-bottom: 30px;
}

.eye {
  width: 80px;
  height: 40px;
  border-top: 3px solid white;
  border-radius: 50% 50% 0 0;
  position: relative;
  animation: blink 4s infinite;
}

.lashes {
  position: absolute;
  top: -6px;
  left: 0;
  width: 100%;
  height: 10px;
}

.lashes::before {
  content: "";
  position: absolute;
  left: 0;
  width: 100%;
  height: 2px;
  background: white;
  box-shadow:
    5px -5px 0 white,
    15px -7px 0 white,
    25px -6px 0 white,
    35px -8px 0 white,
    45px -6px 0 white,
    55px -7px 0 white;
}

@keyframes blink {
  0%, 92%, 100% { height: 40px; }
  95% { height: 5px; }
}

.intro-title {
  font-size: 20px;
  letter-spacing: 6px;
  font-weight: 300;
  text-transform: uppercase;
}

@keyframes fadeOut {
  to {
    opacity: 0;
    visibility: hidden;
  }
}

/* HEADER PREMIUM */
.header-premium {
  background: linear-gradient(135deg, #d81b60, #ad1457);
  padding: 40px 20px;
  text-align: center;
  color: white;
}

.logo {
  font-size: 34px;
  letter-spacing: 3px;
}

.logo span {
  display: block;
  font-size: 14px;
  opacity: 0.8;
}

/* LAYOUT */
.container {
  display: flex;
  padding: 20px;
  gap: 20px;
}

/* VIDEO */
.video {
  flex: 2;
  position: relative;
}

.video video {
  width: 100%;
  height: 420px;
  object-fit: cover;
  border-radius: 15px;
}

/* SOM */
.sound-btn {
  position: absolute;
  bottom: 20px;
  left: 20px;
  background: #d81b60;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 50px;
  cursor: pointer;
}

/* SIDEBAR */
.sidebar {
  flex: 1;
  background: white;
  padding: 20px;
  border-radius: 15px;
}

/* BOTÕES */
.tabs button {
  width: 100%;
  padding: 14px;
  margin-bottom: 10px;
  border: none;
  background: linear-gradient(135deg, #d81b60, #ad1457);
  color: white;
  border-radius: 10px;
}

/* CONTEÚDO */
.content {
  margin-top: 15px;
  padding: 15px;
  background: #fff;
  border-radius: 10px;
}

/* CARDS */
.card {
  padding: 12px;
  margin-bottom: 8px;
  border-radius: 10px;
  background: #fce4ec;
  cursor: pointer;
}

/* FOOTER */
footer {
  background: linear-gradient(135deg, #d81b60, #ad1457);
  color: white;
  text-align: center;
  padding: 15px;
}

/* RESPONSIVO */
@media(max-width: 768px){
  .container {
    flex-direction: column;
  }
}
</style>
</head>

<body>

<!-- INTRO -->
<div class="intro">
  <div class="eyes">
    <div class="eye"><div class="lashes"></div></div>
    <div class="eye"><div class="lashes"></div></div>
  </div>
  <h1 class="intro-title">STUDIO JULIE BARROSO</h1>
</div>

<header class="header-premium">
  <div class="logo">
    <span>Studio</span>
    Julie Barroso
  </div>
</header>

<div class="container">

  <div class="video">
    <video id="videoPlayer" autoplay muted loop controls>
      <source src="apresentacao.mp4" type="video/mp4">
    </video>
    <button class="sound-btn" onclick="toggleSound()">🔊</button>
  </div>

  <div class="sidebar">

    <div class="tabs">
      <button onclick="showTab(1)">Sobre</button>
      <button onclick="showTab(2)">Cílios</button>
      <button onclick="showTab(3)">Localização</button>
    </div>

    <div class="content" id="content">
      Clique em uma opção 💖
    </div>

  </div>

</div>

<footer>
  © Studio Julie Barroso • Extensão de Cílios 💖
</footer>

<script>

function toggleSound(){
  const video = document.getElementById("videoPlayer");
  video.muted = !video.muted;
}

function showTab(tab){
  const content = document.getElementById("content");

  if(tab === 1){
    content.innerHTML = `
      <h3>Sobre</h3>
      <p>Especialistas em extensão de cílios, realçando sua beleza com elegância.</p>
    `;
  }

  if(tab === 2){
    let lista = "<h3>Serviços</h3>";
    const nomes = ["Clássico","Volume Russo","Híbrido","Mega Volume","Fox Eyes","Lash Lift"];

    nomes.forEach(n=>{
      lista += `<div class="card" onclick="detalhe('${n}')">✨ ${n}</div>`;
    });

    content.innerHTML = lista;
  }

  if(tab === 3){
    content.innerHTML = `
      <iframe src="https://maps.google.com/maps?q=Studio%20Julie%20Barroso&output=embed" width="100%" height="200"></iframe>
    `;
  }
}

function detalhe(nome){
  const content = document.getElementById("content");

  content.innerHTML = `
    <h3>${nome}</h3>
    <p>Técnica profissional para destacar seu olhar com naturalidade e sofisticação.</p>
    <button onclick="showTab(2)">Voltar</button>
  `;
}

</script>

</body>
</html>
