<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio Julie Barroso</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ffffff, #fce4ec);
}

/* ===== INTRO PREMIUM ===== */
.intro {
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at 50% 30%, #3d0028 0%, #1a0012 45%, #0d0008 100%);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: white;
  z-index: 9999;
  overflow: hidden;
  transition: opacity 1s ease, transform 1s ease;
}

.intro.hide {
  opacity: 0;
  transform: scale(1.05);
  pointer-events: none;
}

/* ANÉIS */
.intro-ring {
  position: absolute;
  border-radius: 50%;
  border: 0.5px solid rgba(216,27,96,0.18);
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  animation: ring-pulse 6s ease-in-out infinite;
  pointer-events: none;
}
.intro-ring:nth-child(1) { width: 380px; height: 380px; animation-delay: 0s; }
.intro-ring:nth-child(2) { width: 560px; height: 560px; border-color: rgba(216,27,96,0.1); animation-delay: 1s; }
.intro-ring:nth-child(3) { width: 740px; height: 740px; border-color: rgba(216,27,96,0.06); animation-delay: 2s; }

@keyframes ring-pulse {
  0%, 100% { opacity: 0.5; transform: translate(-50%,-50%) scale(1); }
  50%       { opacity: 1;   transform: translate(-50%,-50%) scale(1.03); }
}

/* BRILHO CHÃO */
.intro-floor {
  position: absolute;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 340px; height: 90px;
  background: radial-gradient(ellipse at center, rgba(216,27,96,0.28) 0%, transparent 70%);
  pointer-events: none;
}

/* BRILHO CENTRAL */
.intro-glow {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 240px; height: 240px;
  background: radial-gradient(ellipse at center, rgba(216,27,96,0.1) 0%, transparent 70%);
  border-radius: 50%;
  animation: glow-breathe 4s ease-in-out infinite;
  pointer-events: none;
}
@keyframes glow-breathe {
  0%, 100% { opacity: 0.6; transform: translate(-50%,-50%) scale(1); }
  50%       { opacity: 1;   transform: translate(-50%,-50%) scale(1.12); }
}

/* PARTÍCULAS */
.intro-particles {
  position: absolute;
  inset: 0;
  pointer-events: none;
}
.intro-particle {
  position: absolute;
  border-radius: 50%;
  background: rgba(255,180,220,0.85);
  animation: particle-rise linear infinite;
}
@keyframes particle-rise {
  0%   { opacity: 0; transform: translateY(0) scale(.5); }
  15%  { opacity: 1; }
  85%  { opacity: .4; }
  100% { opacity: 0; transform: translateY(-600px) scale(.1); }
}

/* LOGO */
.intro-logo {
  position: relative;
  z-index: 4;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.intro-studio {
  font-family: 'Segoe UI', sans-serif;
  font-size: 11px;
  letter-spacing: 9px;
  color: rgba(255,200,230,0.65);
  text-transform: uppercase;
  margin-bottom: 12px;
}

.intro-name-row {
  display: flex;
  align-items: center;
  gap: 20px;
}

.intro-line {
  width: 52px;
  height: 0.5px;
  background: rgba(255,150,200,0.55);
}

.intro-name {
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 38px;
  color: #ffffff;
  font-weight: normal;
  letter-spacing: 6px;
  white-space: nowrap;
}

.intro-tagline {
  font-family: 'Segoe UI', sans-serif;
  font-size: 10px;
  letter-spacing: 7px;
  color: rgba(255,160,210,0.5);
  text-transform: uppercase;
  margin-top: 14px;
}

.intro-divider {
  width: 40px;
  height: 0.5px;
  background: rgba(216,27,96,0.5);
  margin: 14px auto 0;
}

/* TOQUE PARA ENTRAR */
.intro-tap {
  position: relative;
  z-index: 4;
  margin-top: 48px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  cursor: pointer;
}

.intro-tap-btn {
  font-family: 'Segoe UI', sans-serif;
  font-size: 12px;
  letter-spacing: 5px;
  color: #fff;
  text-transform: uppercase;
  padding: 14px 36px;
  border: 1px solid rgba(255,150,200,0.6);
  border-radius: 50px;
  background: rgba(216,27,96,0.18);
  animation: btn-pulse 2.4s ease-in-out infinite;
  backdrop-filter: blur(4px);
  transition: background 0.3s;
}
.intro-tap-btn:hover {
  background: rgba(216,27,96,0.38);
}

.intro-tap-arrow {
  width: 28px;
  height: 28px;
  border: 1.5px solid rgba(255,150,200,0.5);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: arrow-bounce 1.8s ease-in-out infinite;
}
.intro-tap-arrow::after {
  content: "";
  width: 8px;
  height: 8px;
  border-right: 1.5px solid rgba(255,180,220,0.8);
  border-bottom: 1.5px solid rgba(255,180,220,0.8);
  transform: rotate(45deg) translateY(-2px);
}

@keyframes btn-pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(216,27,96,0.0); opacity: 0.85; }
  50%       { box-shadow: 0 0 0 10px rgba(216,27,96,0.0); opacity: 1; }
}
@keyframes btn-pulse {
  0%   { box-shadow: 0 0 0 0   rgba(216,27,96,0.45); }
  70%  { box-shadow: 0 0 0 16px rgba(216,27,96,0); }
  100% { box-shadow: 0 0 0 0   rgba(216,27,96,0); }
}
@keyframes arrow-bounce {
  0%, 100% { transform: translateY(0); opacity: 0.6; }
  50%       { transform: translateY(5px); opacity: 1; }
}

/* ===== HEADER ===== */
.header-premium {
  background: linear-gradient(135deg, #d81b60, #ad1457);
  padding: 40px 20px;
  text-align: center;
  color: white;
}

.logo {
  font-size: 34px;
  letter-spacing: 3px;
}

.logo span {
  display: block;
  font-size: 14px;
  opacity: 0.8;
}

/* LAYOUT */
.container {
  display: flex;
  padding: 20px;
  gap: 20px;
}

/* VIDEO */
.video {
  flex: 2;
  position: relative;
}

.video video {
  width: 100%;
  height: 420px;
  object-fit: cover;
  border-radius: 15px;
}

/* BOTÃO SOM */
.sound-btn {
  position: absolute;
  bottom: 20px;
  left: 20px;
  background: #d81b60;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 50px;
  cursor: pointer;
}

/* SIDEBAR */
.sidebar {
  flex: 1;
  background: white;
  padding: 20px;
  border-radius: 15px;
}

/* BOTÕES */
.tabs button {
  width: 100%;
  padding: 14px;
  margin-bottom: 10px;
  border: none;
  background: linear-gradient(135deg, #d81b60, #ad1457);
  color: white;
  border-radius: 10px;
  cursor: pointer;
}

/* CONTEÚDO */
.content {
  margin-top: 15px;
  padding: 15px;
  background: #fff;
  border-radius: 10px;
}

/* CARDS */
.card {
  padding: 12px;
  margin-bottom: 8px;
  border-radius: 10px;
  background: #fce4ec;
  cursor: pointer;
}

/* FOOTER */
footer {
  background: linear-gradient(135deg, #d81b60, #ad1457);
  color: white;
  text-align: center;
  padding: 15px;
}

/* RESPONSIVO */
@media (max-width: 768px) {
  .container { flex-direction: column; }
  .intro-name { font-size: 28px; letter-spacing: 4px; }
  .intro-line { width: 32px; }
}
</style>
</head>

<body>

<!-- ===== INTRO ===== -->
<div class="intro" id="intro" onclick="fecharIntro()">

  <div class="intro-ring"></div>
  <div class="intro-ring"></div>
  <div class="intro-ring"></div>
  <div class="intro-floor"></div>
  <div class="intro-glow"></div>
  <div class="intro-particles" id="introParticles"></div>

  <div class="intro-logo">
    <div class="intro-studio">Studio</div>
    <div class="intro-name-row">
      <div class="intro-line"></div>
      <div class="intro-name">Julie Barroso</div>
      <div class="intro-line"></div>
    </div>
    <div class="intro-tagline">Extensão de Cílios</div>
    <div class="intro-divider"></div>
  </div>

  <div class="intro-tap">
    <div class="intro-tap-btn">Toque para entrar</div>
    <div class="intro-tap-arrow"></div>
  </div>

</div>

<!-- ===== SITE ===== -->
<header class="header-premium">
  <div class="logo">
    <span>Studio</span>
    Julie Barroso
  </div>
</header>

<div class="container">

  <div class="video">
    <video id="videoPlayer" autoplay muted loop controls>
      <source src="apresentacao.mp4" type="video/mp4">
    </video>
    <button class="sound-btn" onclick="toggleSound()">🔊</button>
  </div>

  <div class="sidebar">
    <div class="tabs">
      <button onclick="showTab(1)">Sobre</button>
      <button onclick="showTab(2)">Cílios</button>
      <button onclick="showTab(3)">Localização</button>
    </div>
    <div class="content" id="content">
      Clique em uma opção 💖
    </div>
  </div>

</div>

<footer>
  © Studio Julie Barroso • Extensão de Cílios 💖
</footer>

<script>
// ---- PARTÍCULAS DA INTRO ----
(function() {
  const container = document.getElementById('introParticles');
  for (let i = 0; i < 45; i++) {
    const p = document.createElement('div');
    p.className = 'intro-particle';
    const size = Math.random() * 2.5 + 0.8;
    p.style.cssText =
      'left:'    + (Math.random() * 100) + '%;' +
      'bottom:'  + (Math.random() * 50)  + 'px;' +
      'width:'   + size + 'px;' +
      'height:'  + size + 'px;' +
      'animation-duration:' + (Math.random() * 8 + 6)  + 's;' +
      'animation-delay:'    + (Math.random() * 9)       + 's;';
    container.appendChild(p);
  }
})();

// ---- FECHAR INTRO ----
function fecharIntro() {
  const intro = document.getElementById('intro');
  intro.classList.add('hide');
  setTimeout(function() {
    intro.style.display = 'none';
  }, 1000);
}

// ---- SOM DO VÍDEO ----
function toggleSound() {
  const video = document.getElementById('videoPlayer');
  video.muted = !video.muted;
}

// ---- ABAS ----
function showTab(tab) {
  const content = document.getElementById('content');

  if (tab === 1) {
    content.innerHTML = '<h3>Sobre</h3><p>Especialistas em extensão de cílios, trazendo elegância e autoestima.</p>';
  }

  if (tab === 2) {
    const nomes = ['Clássico','Volume Russo','Híbrido','Mega Volume','Fox Eyes','Lash Lift'];
    let lista = '<h3>Serviços</h3>';
    nomes.forEach(function(n) {
      lista += '<div class="card" onclick="detalhe(\'' + n + '\')">✨ ' + n + '</div>';
    });
    content.innerHTML = lista;
  }

  if (tab === 3) {
    content.innerHTML = '<iframe src="https://maps.google.com/maps?q=Studio%20Julie%20Barroso&output=embed" width="100%" height="200"></iframe>';
  }
}

function detalhe(nome) {
  const content = document.getElementById('content');
  content.innerHTML =
    '<h3>' + nome + '</h3>' +
    '<p>Técnica profissional para valorizar seu olhar com sofisticação.</p>' +
    '<button onclick="showTab(2)">Voltar</button>';
}
</script>

</body>
</html>
