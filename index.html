<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio Julie Barroso</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ffffff, #fce4ec);
  color: #333;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* HEADER PREMIUM */
.header-premium {
  background: linear-gradient(135deg, #d81b60, #ad1457);
  padding: 40px 20px 30px;
  text-align: center;
  color: white;
  position: relative;
  overflow: hidden;
}

.logo {
  margin: 0;
  font-size: 36px;
  font-weight: 300;
  letter-spacing: 3px;
  position: relative;
}

.logo span {
  display: block;
  font-size: 14px;
  letter-spacing: 4px;
  opacity: 0.8;
  margin-bottom: 5px;
}

.logo::after {
  content: "";
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.4), transparent);
  animation: shine 4s infinite;
}

@keyframes shine {
  0% { left: -100%; }
  50% { left: 100%; }
  100% { left: 100%; }
}

.tagline {
  margin-top: 10px;
  font-size: 13px;
  letter-spacing: 2px;
  opacity: 0.85;
}

.header-premium::before {
  content: "";
  width: 60px;
  height: 2px;
  background: rgba(255,255,255,0.6);
  position: absolute;
  bottom: 15px;
  left: 50%;
  transform: translateX(-50%);
}

/* LAYOUT */
.container {
  display: flex;
  padding: 20px;
  gap: 20px;
  flex: 1;
}

/* VIDEO */
.video {
  flex: 2;
  position: relative;
}

.video video {
  width: 100%;
  height: 420px;
  object-fit: cover;
  border-radius: 15px;
  z-index: 1;
  position: relative;
}

.video::after {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
}

/* BOTÃO SOM */
.sound-btn {
  position: absolute;
  bottom: 20px;
  left: 20px;
  background: rgba(216,27,96,0.9);
  color: white;
  border: none;
  padding: 10px 14px;
  border-radius: 50px;
  cursor: pointer;
  z-index: 20;
}

/* BLUR */
.video.blur video {
  filter: blur(4px) brightness(0.7);
}

/* IMAGEM CENTRAL */
.overlay-img {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-80%, -50%) scale(0.8);
  opacity: 0;
  transition: 0.6s;
  z-index: 10;
}

.overlay-img img {
  width: 300px;
  height: 300px;
  border-radius: 20px;
  object-fit: cover;
  box-shadow: 0 25px 60px rgba(0,0,0,0.7);
}

.overlay-img.active {
  transform: translate(-50%, -50%) scale(1);
  opacity: 1;
}

/* SIDEBAR */
.sidebar {
  flex: 1;
  background: white;
  padding: 20px;
  border-radius: 15px;
}

/* BOTÕES */
.tabs button {
  width: 100%;
  padding: 14px;
  margin-bottom: 10px;
  border: none;
  background: linear-gradient(135deg, #d81b60, #ad1457);
  color: white;
  border-radius: 10px;
  cursor: pointer;
}

/* CONTEÚDO */
.content {
  margin-top: 15px;
  padding: 15px;
  background: #fff;
  border-radius: 10px;
}

/* CARDS */
.card {
  padding: 12px;
  margin-bottom: 8px;
  border-radius: 10px;
  background: #fce4ec;
  cursor: pointer;
}

/* FOOTER */
footer {
  background: linear-gradient(135deg, #d81b60, #ad1457);
  color: white;
  text-align: center;
  padding: 15px;
}

/* RESPONSIVO */
@media(max-width: 768px){
  .container {
    flex-direction: column;
  }
  .overlay-img {
    display: none;
  }
}
</style>
</head>

<body>

<header class="header-premium">
  <h1 class="logo">
    <span>Studio</span>
    Julie Barroso
  </h1>
  <div class="tagline">Beleza • Estética • Autoestima</div>
</header>

<div class="container">

  <div id="videoBox" class="video">

    <video id="videoPlayer" autoplay muted loop controls>
      <source src="apresentacao.mp4" type="video/mp4">
    </video>

    <button class="sound-btn" onclick="toggleSound()">🔊</button>

    <div id="overlayImg" class="overlay-img">
      <img id="overlayPhoto">
    </div>

  </div>

  <div class="sidebar">

    <div class="tabs">
      <button onclick="showTab(1)">Sobre</button>
      <button onclick="showTab(2)">Procedimentos</button>
      <button onclick="showTab(3)">Localização</button>
    </div>

    <div class="content" id="content">
      Clique em uma opção 💖
    </div>

  </div>

</div>

<footer>
  © Studio Julie Barroso • Todos os direitos reservados
</footer>

<script>

function toggleSound(){
  const video = document.getElementById("videoPlayer");
  video.muted = !video.muted;
}

function playVideo(){
  document.getElementById("videoPlayer").play();
}

function showTab(tab){
  const content = document.getElementById("content");
  const overlay = document.getElementById("overlayImg");
  const video = document.getElementById("videoBox");

  overlay.classList.remove("active");
  video.classList.remove("blur");

  if(tab === 1){
    content.innerHTML = "<h3>Sobre</h3><p>Um espaço pensado para valorizar sua beleza com conforto e sofisticação.</p>";
  }

  if(tab === 2){
    let lista = "<h3>Procedimentos</h3>";
    for(let i=1;i<=10;i++){
      lista += `<div class="card" onclick="detalhe(${i})">✨ Procedimento ${i}</div>`;
    }
    content.innerHTML = lista;
  }

  if(tab === 3){
    content.innerHTML = `<iframe src="https://maps.google.com/maps?q=Studio%20Julie%20Barroso&output=embed" width="100%" height="200"></iframe>`;
  }
}

function detalhe(num){
  playVideo();

  const content = document.getElementById("content");
  const overlay = document.getElementById("overlayImg");
  const img = document.getElementById("overlayPhoto");
  const video = document.getElementById("videoBox");

  img.src = "https://source.unsplash.com/600x600/?beauty";

  overlay.classList.add("active");
  video.classList.add("blur");

  content.innerHTML = `
    <h3>Procedimento ${num}</h3>
    <p>Realce sua beleza com técnicas modernas e resultados naturais.</p>
    <button onclick="showTab(2)">Voltar</button>
  `;
}

</script>

</body>
</html>
