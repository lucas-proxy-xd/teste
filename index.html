<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio Julie Barroso</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --b:      #F06292;
  --b-deep: #E91E8C;
  --b-mid:  #F48FB1;
  --b-soft: #F8BBD0;
  --b-pale: #FCE4EC;
  --b-blush:#FFF0F5;
  --white:  #FFFFFF;
  --text-dark: #3A1020;
  --text-mid:  #7C2A47;
  --text-light:#B06080;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Jost', sans-serif; background: var(--b-blush); min-height: 100vh; }

/* ── INTRO ── */
.intro {
  position:fixed; inset:0;
  background:linear-gradient(155deg, var(--b-mid) 0%, var(--b) 45%, #EC407A 100%);
  display:flex; flex-direction:column; justify-content:center; align-items:center;
  z-index:9999; overflow:hidden; cursor:pointer;
  transition:opacity 1.2s cubic-bezier(.4,0,.2,1), transform 1.2s cubic-bezier(.4,0,.2,1);
}
.intro.hide { opacity:0; transform:scale(1.04); pointer-events:none; }
.intro-light {
  position:absolute; inset:0; pointer-events:none;
  background:
    radial-gradient(ellipse at 50% 25%, rgba(255,255,255,.22) 0%, transparent 55%),
    radial-gradient(ellipse at 18% 75%, rgba(255,255,255,.10) 0%, transparent 40%),
    radial-gradient(ellipse at 85% 15%, rgba(255,255,255,.12) 0%, transparent 35%);
}
.intro-grid {
  position:absolute; inset:0; pointer-events:none;
  background-image:linear-gradient(rgba(255,255,255,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.06) 1px,transparent 1px);
  background-size:60px 60px;
}
.intro-ring { position:absolute; border-radius:50%; top:50%; left:50%; transform:translate(-50%,-50%); pointer-events:none; }
.intro-ring:nth-child(3){ width:300px;height:300px;border:.5px solid rgba(255,255,255,.35);animation:ring 6s ease-in-out infinite 0s; }
.intro-ring:nth-child(4){ width:480px;height:480px;border:.5px solid rgba(255,255,255,.18);animation:ring 6s ease-in-out infinite 1.2s; }
.intro-ring:nth-child(5){ width:660px;height:660px;border:.5px solid rgba(255,255,255,.08);animation:ring 6s ease-in-out infinite 2.4s; }
@keyframes ring { 0%,100%{opacity:.5;transform:translate(-50%,-50%) scale(1);} 50%{opacity:1;transform:translate(-50%,-50%) scale(1.025);} }
.intro-particles{position:absolute;inset:0;pointer-events:none;}
.intro-particle{position:absolute;border-radius:50%;animation:p-rise linear infinite;}
@keyframes p-rise { 0%{opacity:0;transform:translateY(0) scale(1);}10%{opacity:1;}85%{opacity:.3;}100%{opacity:0;transform:translateY(-100vh) scale(.15);} }
.intro-logo{position:relative;z-index:4;display:flex;flex-direction:column;align-items:center;margin-bottom:56px;}
.intro-eyebrow{font-size:10px;font-weight:500;letter-spacing:10px;text-transform:uppercase;color:rgba(255,255,255,.75);margin-bottom:20px;opacity:0;animation:fade-up .9s ease forwards .3s;}
.intro-name-row{display:flex;align-items:center;gap:22px;opacity:0;animation:fade-up .9s ease forwards .55s;}
.intro-deco-line{width:60px;height:.5px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.85),transparent);}
.intro-name{font-family:'Cormorant Garamond',Georgia,serif;font-size:52px;font-weight:300;letter-spacing:9px;color:#fff;white-space:nowrap;text-shadow:0 2px 32px rgba(0,0,0,.12);}
.intro-sub{font-size:10px;font-weight:400;letter-spacing:8px;text-transform:uppercase;color:rgba(255,255,255,.7);margin-top:18px;opacity:0;animation:fade-up .9s ease forwards .75s;}
.intro-diamonds{display:flex;align-items:center;gap:10px;margin-top:18px;opacity:0;animation:fade-up .9s ease forwards .9s;}
.intro-d{width:4px;height:4px;background:rgba(255,255,255,.6);transform:rotate(45deg);}
.intro-d.lg{width:6px;height:6px;background:#fff;}
.intro-dthin{width:70px;height:.5px;background:rgba(255,255,255,.35);}
.intro-cta{position:relative;z-index:4;display:flex;flex-direction:column;align-items:center;gap:18px;opacity:0;animation:fade-up .9s ease forwards 1.05s;}
.intro-cta-btn{
  font-family:'Jost',sans-serif;font-size:11px;font-weight:600;letter-spacing:5px;text-transform:uppercase;
  color:var(--b);background:#fff;border:none;border-radius:60px;padding:20px 60px;cursor:pointer;
  transition:background .3s,transform .25s,box-shadow .3s;
  animation:pulse-btn 2.5s ease-out infinite 1.4s;
  box-shadow:0 8px 32px rgba(0,0,0,.15);
}
.intro-cta-btn:hover{background:var(--b-pale);transform:translateY(-3px);box-shadow:0 16px 40px rgba(0,0,0,.2);}
@keyframes pulse-btn{0%{box-shadow:0 0 0 0 rgba(255,255,255,.5);}65%{box-shadow:0 0 0 18px rgba(255,255,255,0);}100%{box-shadow:0 0 0 0 rgba(255,255,255,0);}}
.intro-arrows{display:flex;flex-direction:column;align-items:center;gap:4px;animation:arrows-drop 1.8s ease-in-out infinite 2s;}
.intro-arrows span{display:block;width:9px;height:9px;border-right:1.5px solid rgba(255,255,255,.6);border-bottom:1.5px solid rgba(255,255,255,.6);transform:rotate(45deg);}
.intro-arrows span:nth-child(2){opacity:.5;}
.intro-arrows span:nth-child(3){opacity:.22;}
@keyframes arrows-drop{0%,100%{transform:translateY(0);}50%{transform:translateY(6px);}}
@keyframes fade-up{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}

/* ── HEADER ── */
.header-premium {
  background: linear-gradient(135deg, #F48FB1 0%, var(--b) 50%, #EC407A 100%);
  padding: 36px 24px 30px;
  text-align: center; position: relative; overflow: hidden;
}
.header-premium::after {
  content:""; position:absolute; bottom:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);
}
.header-premium::before {
  content:""; position:absolute; inset:0; pointer-events:none;
  background:
    radial-gradient(ellipse at 22% 50%, rgba(255,255,255,.12) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 50%, rgba(255,255,255,.08) 0%, transparent 45%);
}
.logo-premium{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;}
.logo-eyebrow{font-family:'Jost',sans-serif;font-size:10px;font-weight:500;letter-spacing:9px;text-transform:uppercase;color:rgba(255,255,255,.72);margin-bottom:14px;}
.logo-name-row{display:flex;align-items:center;gap:22px;}
.logo-line{flex:1;max-width:100px;height:.5px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.65),transparent);}
.logo-main{font-family:'Cormorant Garamond',Georgia,serif;font-size:42px;font-weight:300;letter-spacing:9px;color:#fff;white-space:nowrap;text-shadow:0 2px 28px rgba(0,0,0,.12);}
.logo-diamonds{display:flex;align-items:center;gap:10px;margin-top:14px;}
.logo-d{width:4px;height:4px;background:rgba(255,255,255,.55);transform:rotate(45deg);}
.logo-d.lg{width:6px;height:6px;background:#fff;}
.logo-thin{width:100px;height:.5px;background:rgba(255,255,255,.28);}
.logo-tagline{font-family:'Jost',sans-serif;font-size:9px;font-weight:400;letter-spacing:7px;text-transform:uppercase;color:rgba(255,255,255,.6);margin-top:12px;}

/* ── LAYOUT ── */
.site-body {
  max-width: 1100px;
  margin: 0 auto;
  padding: 32px 24px 40px;
  display: flex;
  gap: 28px;
  align-items: flex-start;
}

/* ── VÍDEO ── */
.video-col { flex: 3; display: flex; flex-direction: column; }
.video-frame {
  position: relative;
  border-radius: 20px;
  overflow: hidden;
  background: var(--b-pale);
  box-shadow: 0 20px 60px rgba(240,98,146,.18), 0 4px 16px rgba(0,0,0,.06);
  border: 1.5px solid rgba(255,255,255,.9);
}
.video-frame video { width: 100%; height: 420px; object-fit: cover; display: block; }
.video-frame::after {
  content:""; position:absolute; bottom:0; left:0; right:0; height:90px;
  background:linear-gradient(to top, rgba(50,0,25,.32), transparent);
  pointer-events:none;
}
.sound-btn {
  position: absolute; bottom: 18px; left: 18px; z-index: 3;
  display: inline-flex; align-items: center; gap: 10px;
  border: 1px solid rgba(255,255,255,.45); border-radius: 999px;
  padding: 9px 16px 9px 9px; cursor: pointer; color: #fff;
  background: rgba(60,0,30,.45); backdrop-filter: blur(14px);
  transition: background .25s, transform .22s, box-shadow .22s;
  font-family: 'Jost', sans-serif;
}
.sound-btn:hover { background: rgba(240,98,146,.7); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.14); }
.sound-btn.is-on { background: rgba(240,98,146,.82); }
.sound-btn-icon { width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.18);font-size:15px;flex-shrink:0; }
.sound-btn-label { display:flex;flex-direction:column;line-height:1.15; }
.sound-btn-label strong { font-size:11px;font-weight:600;letter-spacing:.6px;text-transform:uppercase; }
.sound-btn-label small  { font-size:10px;opacity:.75;letter-spacing:.3px; }
.video-brand {
  position:absolute;bottom:18px;right:18px;z-index:3;
  font-family:'Cormorant Garamond',Georgia,serif;
  font-size:13px;font-weight:300;letter-spacing:3px;
  color:rgba(255,255,255,.75);text-transform:uppercase;
}

/* ── SIDEBAR ── */
.sidebar-col {
  flex: 2;
  display: flex;
  flex-direction: column;
  gap: 12px;
  min-width: 0;
}
.sidebar-header {
  padding: 0 2px 14px;
  border-bottom: .5px solid rgba(240,98,146,.2);
}
.sidebar-header p {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 22px; font-weight: 300; letter-spacing: 2px; color: var(--text-dark);
}
.sidebar-header span {
  font-size: 11px; font-weight: 400; letter-spacing: 3px;
  text-transform: uppercase; color: var(--text-light);
  display: block; margin-top: 4px;
}

/* ── ABAS PRINCIPAIS (apenas 2) ── */
.tabs-main {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  width: 100%;
}
.tab-main-btn {
  flex: 1;
  padding: 14px 10px;
  border-radius: 14px;
  border: 1px solid rgba(240,98,146,.18);
  background: var(--white);
  color: var(--text-dark);
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: transform .2s, box-shadow .2s, background .2s, border-color .2s;
  font-family: 'Jost', sans-serif;
  text-align: center;
  min-width: 0;
}
.tab-main-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 28px rgba(240,98,146,.13);
  border-color: rgba(240,98,146,.3);
  background: var(--b-blush);
}
.tab-main-btn.active {
  background: linear-gradient(135deg, var(--b) 0%, #EC407A 100%);
  color: #fff;
  border-color: transparent;
  box-shadow: 0 12px 30px rgba(240,98,146,.28);
}
.tab-main-icon {
  width: 44px; height: 44px; border-radius: 14px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  background: var(--b-pale); font-size: 18px;
  transition: background .2s;
}
.tab-main-btn.active .tab-main-icon { background: rgba(255,255,255,.2); }
.tab-main-label strong {
  display: block; font-size: 13px; font-weight: 500; letter-spacing: .3px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.tab-main-label small {
  display: block; font-size: 10px; opacity: .6; letter-spacing: .2px; margin-top: 2px;
}
.tab-main-btn.active .tab-main-label small { opacity: .85; }

/* ── SUB-ABAS ── */
.sub-tabs {
  display: flex;
  gap: 6px;
  background: var(--b-pale);
  border-radius: 12px;
  padding: 5px;
}
.sub-tab-btn {
  flex: 1;
  padding: 9px 8px;
  border-radius: 9px;
  border: none;
  background: transparent;
  color: var(--text-mid);
  font-family: 'Jost', sans-serif;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: .4px;
  cursor: pointer;
  transition: background .2s, color .2s, box-shadow .2s;
  white-space: nowrap;
  text-align: center;
}
.sub-tab-btn:hover { background: rgba(255,255,255,.7); }
.sub-tab-btn.active {
  background: var(--white);
  color: var(--b-deep);
  box-shadow: 0 2px 10px rgba(240,98,146,.14);
  font-weight: 600;
}

/* ── CONTENT PANEL ── */
.content-panel {
  background: var(--white); border-radius: 16px;
  border: 1px solid rgba(240,98,146,.1); padding: 20px;
  box-shadow: 0 4px 20px rgba(240,98,146,.07); min-height: 120px;
}
.panel-placeholder { display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:32px 16px;color:var(--text-light); }
.panel-placeholder-icon { width:48px;height:48px;border-radius:50%;background:var(--b-pale);display:flex;align-items:center;justify-content:center;font-size:20px; }
.panel-placeholder p { font-size:13px;letter-spacing:.4px; }
.panel-heading { font-family:'Cormorant Garamond',Georgia,serif;font-size:20px;font-weight:400;letter-spacing:1.5px;color:var(--text-dark);margin-bottom:8px; }
.panel-rule { width:32px;height:1.5px;background:linear-gradient(90deg,var(--b),var(--b-mid));border-radius:2px;margin-bottom:16px; }
.panel-text { font-size:13px;line-height:1.8;color:#666; }

/* ── CARDS ── */
.card {
  display:flex;align-items:center;gap:14px;
  padding:12px 14px;margin-bottom:8px;border-radius:14px;
  background:var(--b-blush);cursor:pointer;
  border:1px solid rgba(240,98,146,.1);
  transition:transform .2s,box-shadow .2s,border-color .2s,background .2s;
}
.card:last-child{margin-bottom:0;}
.card:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(240,98,146,.14);border-color:rgba(240,98,146,.28);background:#fff;}
.card-thumb{width:52px;height:52px;border-radius:12px;flex-shrink:0;background:var(--b-pale);display:flex;align-items:center;justify-content:center;font-size:22px;overflow:hidden;}
.card-thumb img{width:100%;height:100%;object-fit:cover;border-radius:12px;}
.card-info{flex:1;min-width:0;}
.card-title{font-size:14px;font-weight:500;color:var(--text-dark);margin-bottom:3px;}
.card-desc{font-size:11px;color:var(--text-light);letter-spacing:.3px;}
.card-arrow{font-size:18px;color:rgba(240,98,146,.35);flex-shrink:0;}

/* ── DETALHE ── */
.detalhe-img{width:calc(100% + 40px);margin:-20px -20px 18px;height:180px;display:flex;align-items:center;justify-content:center;background:var(--b-pale);font-size:56px;overflow:hidden;border-radius:16px 16px 0 0;position:relative;}
.detalhe-img img{width:100%;height:100%;object-fit:cover;}
.detalhe-img-label{position:absolute;bottom:10px;left:14px;font-size:10px;letter-spacing:3px;color:rgba(255,255,255,.85);text-transform:uppercase;background:rgba(0,0,0,.18);padding:4px 9px;border-radius:4px;}
.detalhe-nome{font-family:'Cormorant Garamond',Georgia,serif;font-size:22px;font-weight:400;letter-spacing:2px;color:var(--text-dark);margin-bottom:8px;}
.detalhe-rule{width:32px;height:1.5px;background:var(--b);border-radius:2px;margin-bottom:14px;}
.detalhe-texto{font-size:13px;line-height:1.8;color:#666;margin-bottom:16px;}
.detalhe-badges{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.detalhe-badge{font-size:11px;letter-spacing:.6px;padding:6px 14px;border-radius:20px;background:var(--b-pale);color:var(--text-mid);border:.5px solid rgba(240,98,146,.2);}
.btn-voltar{display:flex;align-items:center;gap:8px;background:none;border:1px solid rgba(240,98,146,.3);color:var(--b);padding:11px 20px;border-radius:10px;cursor:pointer;font-size:13px;font-family:'Jost',sans-serif;width:100%;justify-content:center;margin-top:4px;transition:background .2s,border-color .2s;}
.btn-voltar:hover{background:var(--b-pale);border-color:rgba(240,98,146,.45);}

/* ── MAPA ── */
.map-container iframe {
  width: 100%; height: 220px; border-radius: 12px;
  border: none; display: block; margin-top: 12px;
}
.map-info {
  display: flex; flex-direction: column; gap: 10px; margin-bottom: 4px;
}
.map-info-row {
  display: flex; align-items: flex-start; gap: 10px;
  font-size: 13px; color: var(--text-mid);
}
.map-info-row span:first-child {
  font-size: 16px; flex-shrink: 0; margin-top: 1px;
}

/* ── FOOTER ── */
footer{background:linear-gradient(135deg,#EC407A 0%,var(--b) 100%);color:rgba(255,255,255,.78);text-align:center;padding:20px 24px;font-size:12px;letter-spacing:1.2px;border-top:1px solid rgba(255,255,255,.15);font-family:'Jost',sans-serif;}
footer strong{color:#fff;font-weight:600;}

/* ── RESPONSIVO ── */
@media(max-width:768px){
  .site-body{flex-direction:column;padding:20px 16px 32px;gap:20px;width:100%;}
  .video-col, .sidebar-col { width: 100%; flex: none; }
  .sidebar-col { align-items: stretch; }
  .video-frame video{height:220px;}
  .intro-name{font-size:32px;letter-spacing:6px;}
  .intro-deco-line{width:30px;}
  .logo-main{font-size:30px;letter-spacing:6px;}
  .logo-line{max-width:44px;}
  .detalhe-img{height:160px;}
  .tabs-main {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    width: 100%;
  }
  .tab-main-btn {
    width: 100%;
    padding: 14px 8px;
    gap: 8px;
    align-items: center;
    justify-content: center;
  }
  .tab-main-icon { width: 38px; height: 38px; font-size: 16px; }
  .tab-main-label strong { font-size: 12px; }
  .tab-main-label small { font-size: 10px; }
  .sub-tabs { gap: 4px; width: 100%; }
  .sub-tab-btn { font-size: 10px; padding: 8px 4px; }
  .content-panel { width: 100%; }
}
</style>
</head>
<body>

<!-- INTRO -->
<div class="intro" id="intro" onclick="fecharIntro()">
  <div class="intro-light"></div>
  <div class="intro-grid"></div>
  <div class="intro-ring"></div>
  <div class="intro-ring"></div>
  <div class="intro-ring"></div>
  <div class="intro-particles" id="introParticles"></div>
  <div class="intro-logo">
    <div class="intro-eyebrow">Studio</div>
    <div class="intro-name-row">
      <div class="intro-deco-line"></div>
      <div class="intro-name">Julie Barroso</div>
      <div class="intro-deco-line"></div>
    </div>
    <div class="intro-sub">Extensão de Cílios & Estética</div>
    <div class="intro-diamonds">
      <div class="intro-dthin"></div>
      <div class="intro-d"></div><div class="intro-d lg"></div><div class="intro-d"></div>
      <div class="intro-dthin"></div>
    </div>
  </div>
  <div class="intro-cta">
    <button class="intro-cta-btn" type="button">Toque para entrar</button>
    <div class="intro-arrows"><span></span><span></span><span></span></div>
  </div>
</div>

<!-- HEADER -->
<header class="header-premium">
  <div class="logo-premium">
    <div class="logo-eyebrow">Studio</div>
    <div class="logo-name-row">
      <div class="logo-line"></div>
      <div class="logo-main">Julie Barroso</div>
      <div class="logo-line"></div>
    </div>
    <div class="logo-diamonds">
      <div class="logo-thin"></div>
      <div class="logo-d"></div><div class="logo-d lg"></div><div class="logo-d"></div>
      <div class="logo-thin"></div>
    </div>
    <div class="logo-tagline">Extensão de Cílios & Estética</div>
  </div>
</header>

<!-- CORPO -->
<main class="site-body">

  <div class="video-col">
    <div class="video-frame">
      <video id="videoPlayer" autoplay muted loop playsinline>
        <source src="apresentacao.mp4" type="video/mp4">
      </video>
      <button class="sound-btn is-muted" id="soundBtn" type="button" onclick="toggleSound()" aria-label="Ativar áudio" aria-pressed="false">
        <span class="sound-btn-icon" id="soundIcon">&#9835;</span>
        <span class="sound-btn-label">
          <strong>Som do vídeo</strong>
          <small id="soundState">Toque para ativar</small>
        </span>
      </button>
      <div class="video-brand">Julie Barroso</div>
    </div>
  </div>

  <div class="sidebar-col">
    <div class="sidebar-header">
      <p>Navegue pelo studio</p>
      <span>Selecione uma opção</span>
    </div>

    <!-- ABAS PRINCIPAIS: apenas 2 -->
    <div class="tabs-main">
      <button class="tab-main-btn" type="button" data-tab="servicos" onclick="showMainTab('servicos')">
        <span class="tab-main-icon">✦</span>
        <span class="tab-main-label">
          <strong>Nossos Serviços</strong>
          <small>Estética &amp; beleza</small>
        </span>
      </button>
      <button class="tab-main-btn" type="button" data-tab="localizacao" onclick="showMainTab('localizacao')">
        <span class="tab-main-icon">📍</span>
        <span class="tab-main-label">
          <strong>Localização</strong>
          <small>Mapa &amp; acesso</small>
        </span>
      </button>
    </div>

    <!-- SUB-ABAS (visível apenas em Nossos Serviços) -->
    <div class="sub-tabs" id="subTabs" style="display:none;">
      <button class="sub-tab-btn" data-sub="extensao" onclick="showSubTab('extensao')">
        👁 Extensão de Cílios
      </button>
      <button class="sub-tab-btn" data-sub="outros" onclick="showSubTab('outros')">
        ✨ Outros Procedimentos
      </button>
    </div>

    <div class="content-panel" id="contentPanel">
      <div class="panel-placeholder">
        <div class="panel-placeholder-icon">✦</div>
        <p>Selecione uma opção acima</p>
      </div>
    </div>
  </div>

</main>

<footer>© <strong>Studio Julie Barroso</strong> &nbsp;·&nbsp; Estética &amp; Beleza</footer>

<script>
/* ── EXTENSÃO DE CÍLIOS ── */
var cilios = {
  'Clássico': {
    imagem: 'classico.jpg', emoji: '👁️',
    resumo: 'Natural e delicado',
    duracao: '2h', fixacao: '3–4 semanas', indicado: 'Uso diário',
    descricao: 'O fio a fio clássico aplica uma extensão por cílio natural, resultando em um olhar mais alongado e definido, mantendo leveza e naturalidade. Ideal para o dia a dia.'
  },
  'Fox Eyes': {
    imagem: 'foxeyes.jpg', emoji: '🦊',
    resumo: 'Efeito gatinho alongado',
    duracao: '2h', fixacao: '3–4 semanas', indicado: 'Tendência atual',
    descricao: 'Técnica que alonga os cílios da extremidade externa dos olhos, criando o famoso efeito olho de raposa — sensual, moderno e muito elegante.'
  },
  'Lash Lifting': {
    imagem: 'lashlift.jpg', emoji: '🌙',
    resumo: 'Seus cílios naturais realçados',
    duracao: '1h', fixacao: '6–8 semanas', indicado: 'Baixa manutenção',
    descricao: 'Procedimento que curva e levanta seus próprios cílios, sem extensões. Com opção de tingimento, o resultado é um olhar aberto e renovado por até 8 semanas.'
  }
};

/* ── OUTROS PROCEDIMENTOS ── */
var servicos = {
  'Limpeza de Pele': {
    imagem: 'limpezadepele.jpg', emoji: '✨',
    resumo: 'Limpeza profunda e renovação',
    duracao: '1h', indicado: 'Todo tipo de pele',
    descricao: 'Procedimento que remove impurezas, células mortas e cravos, deixando a pele limpa, hidratada e com aparência renovada. Indicado para todos os tipos de pele.'
  },
  'Microagulhamento': {
    imagem: 'microagulhamento.jpg', emoji: '💎',
    resumo: 'Rejuvenescimento e firmeza',
    duracao: '1h', indicado: 'Rejuvenescimento',
    descricao: 'Técnica que estimula a produção de colágeno através de microlesões controladas na pele, melhorando textura, manchas, cicatrizes e flacidez.'
  },
  'Remoção de Acrocordons e Mílios': {
    imagem: 'remocaodeacrocordons.jpg', emoji: '🌸',
    resumo: 'Remoção de verrugas e mílios',
    duracao: '30–60min', indicado: 'Avaliação prévia',
    descricao: 'Procedimento estético para remoção segura de acrocordons (verrugas de pele) e mílios (cistos de queratina), com técnica precisa e resultado imediato.'
  },
  'Depilação em Geral': {
    imagem: 'depilacao.jpg', emoji: '🌿',
    resumo: 'Pele lisa e suave',
    duracao: 'Conforme região', indicado: 'Todos os públicos',
    descricao: 'Depilação completa com cera quente, fria ou linha, para todas as regiões do corpo. Resultado duradouro e pele completamente lisa.'
  },
  'Design e Henna': {
    imagem: 'designehenna.jpg', emoji: '🎨',
    resumo: 'Sobrancelhas perfeitas e duradouras',
    duracao: '1h', indicado: 'Definição e preenchimento',
    descricao: 'Design de sobrancelhas personalizado conforme o formato do rosto, com aplicação de henna para preencher, definir e pigmentar os fios. Duração de até 4 semanas.'
  },
  'Brow Lamination e Lash Lifting': {
    imagem: 'browlamination.jpg', emoji: '💫',
    resumo: 'Sobrancelhas e cílios alinhados',
    duracao: '1h30', indicado: 'Efeito natural e estruturado',
    descricao: 'Combo que alinha e fixa os fios das sobrancelhas (Brow Lamination) e curva os cílios naturais (Lash Lifting), sem necessidade de maquiagem. Resultado que dura semanas.'
  }
};

/* ── ESTADO ── */
var activeMainTab = null;
var activeSubTab = null;

/* ── PARTÍCULAS ── */
(function(){
  var c=document.getElementById('introParticles');
  var cores=['rgba(255,255,255,.8)','rgba(255,255,255,.55)','rgba(255,255,255,.38)','rgba(255,210,228,.85)','rgba(255,235,245,.7)'];
  for(var i=0;i<70;i++){
    var p=document.createElement('div');p.className='intro-particle';
    var s=Math.random()*3+1;
    p.style.cssText='left:'+(Math.random()*100)+'%;bottom:'+(Math.random()*30)+'px;width:'+s+'px;height:'+s+'px;background:'+cores[Math.floor(Math.random()*cores.length)]+';animation-duration:'+(Math.random()*10+6)+'s;animation-delay:'+(Math.random()*14)+'s;';
    c.appendChild(p);
  }
})();

function fecharIntro(){
  var el=document.getElementById('intro');
  el.classList.add('hide');
  setTimeout(function(){el.style.display='none';},1200);
}

function updateSoundButton(){
  var v=document.getElementById('videoPlayer'),btn=document.getElementById('soundBtn'),icon=document.getElementById('soundIcon'),st=document.getElementById('soundState'),m=v.muted;
  btn.classList.toggle('is-muted',m);btn.classList.toggle('is-on',!m);
  btn.setAttribute('aria-label',m?'Ativar áudio':'Desativar áudio');btn.setAttribute('aria-pressed',(!m).toString());
  icon.innerHTML=m?'&#9835;':'&#9834;';
  st.textContent=m?'Toque para ativar':'Som ativo';
}
function toggleSound(){var v=document.getElementById('videoPlayer');v.muted=!v.muted;updateSoundButton();}

function panelHeading(title){
  return '<div class="panel-heading">'+title+'</div><div class="panel-rule"></div>';
}

function renderCards(dataset, subKey){
  var title = subKey === 'extensao' ? 'Extensão de Cílios' : 'Outros Procedimentos';
  var html = panelHeading(title);
  Object.keys(dataset).forEach(function(n){
    var d = dataset[n];
    var thumb = d.imagem
      ? '<div class="card-thumb"><img src="'+d.imagem+'" alt="'+n+'"></div>'
      : '<div class="card-thumb">'+d.emoji+'</div>';
    html += '<div class="card" onclick="detalhe(\''+n+'\',\''+subKey+'\')">'
          + thumb
          + '<div class="card-info"><div class="card-title">'+n+'</div><div class="card-desc">'+d.resumo+'</div></div>'
          + '<span class="card-arrow">&rsaquo;</span>'
          + '</div>';
  });
  return html;
}

function showMainTab(tab){
  activeMainTab = tab;
  document.querySelectorAll('.tab-main-btn').forEach(function(btn){
    var a = btn.getAttribute('data-tab') === tab;
    btn.classList.toggle('active', a);
  });

  var subTabs = document.getElementById('subTabs');
  var panel = document.getElementById('contentPanel');

  if(tab === 'servicos'){
    subTabs.style.display = 'flex';
    // Ativa sub-aba padrão
    if(!activeSubTab) activeSubTab = 'extensao';
    showSubTab(activeSubTab);
  } else {
    subTabs.style.display = 'none';
    activeSubTab = null;
    // Aba localização
    panel.innerHTML = panelHeading('Localização')
      + '<div class="map-info">'
      + '<div class="map-info-row"><span>📍</span><span>Studio Julie Barroso — Manaus, AM</span></div>'
      + '<div class="map-info-row"><span>📞</span><span>Entre em contato para agendamento</span></div>'
      + '</div>'
      + '<div class="map-container"><iframe src="https://maps.google.com/maps?q=Studio%20Julie%20Barroso%20Manaus&output=embed"></iframe></div>';
  }
}

function showSubTab(sub){
  activeSubTab = sub;
  document.querySelectorAll('.sub-tab-btn').forEach(function(btn){
    btn.classList.toggle('active', btn.getAttribute('data-sub') === sub);
  });
  var panel = document.getElementById('contentPanel');
  if(sub === 'extensao'){
    panel.innerHTML = renderCards(cilios, 'extensao');
  } else {
    panel.innerHTML = renderCards(servicos, 'outros');
  }
}

function detalhe(nome, subKey){
  var dataset = subKey === 'extensao' ? cilios : servicos;
  var p = dataset[nome];
  var imgHtml = p.imagem
    ? '<img src="'+p.imagem+'" alt="'+nome+'" style="width:100%;height:100%;object-fit:cover;">'
    : '<span>'+p.emoji+'</span>';
  var badges = '<span class="detalhe-badge">⏱ '+p.duracao+'</span>';
  if(p.fixacao) badges += '<span class="detalhe-badge">📅 '+p.fixacao+'</span>';
  badges += '<span class="detalhe-badge">💡 '+p.indicado+'</span>';

  document.getElementById('contentPanel').innerHTML =
    '<div class="detalhe-img">'+imgHtml+'<div class="detalhe-img-label">Studio Julie Barroso</div></div>'+
    '<div class="detalhe-nome">'+nome+'</div>'+
    '<div class="detalhe-rule"></div>'+
    '<p class="detalhe-texto">'+p.descricao+'</p>'+
    '<div class="detalhe-badges">'+badges+'</div>'+
    '<button class="btn-voltar" onclick="showSubTab(\''+subKey+'\')">&#8592; Voltar</button>';

  if(window.innerWidth<=768){
    setTimeout(function(){document.getElementById('contentPanel').scrollIntoView({behavior:'smooth',block:'start'});},50);
  }
}

updateSoundButton();
</script>
</body>
</html>
