<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio Julie Barroso</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ffffff, #fce4ec);
}

/* ===== INTRO ===== */
.intro {
  position: fixed;
  inset: 0;
  background: linear-gradient(135deg, #d81b60, #ad1457);
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  color: white;
  z-index: 9999;
  animation: fadeOut 1s ease 4s forwards;
}

/* OLHOS */
.eyes {
  display: flex;
  gap: 40px;
  margin-bottom: 20px;
}

.eye {
  width: 60px;
  height: 30px;
  border-bottom: 4px solid white;
  border-radius: 0 0 60px 60px;
  position: relative;
  animation: blink 3s infinite;
}

.eye::after {
  content: "";
  position: absolute;
  top: 10px;
  left: 20px;
  width: 10px;
  height: 10px;
  background: white;
  border-radius: 50%;
}

/* PISCAR */
@keyframes blink {
  0%, 90%, 100% { height: 30px; }
  95% { height: 5px; }
}

/* TEXTO */
.intro h1 {
  letter-spacing: 4px;
  font-size: 20px;
}

/* SUMIR */
@keyframes fadeOut {
  to {
    opacity: 0;
    visibility: hidden;
  }
}

/* ===== HEADER ===== */
.header-premium {
  background: linear-gradient(135deg, #d81b60, #ad1457);
  padding: 40px 20px;
  text-align: center;
  color: white;
}

.logo {
  font-size: 34px;
  letter-spacing: 3px;
}

.logo span {
  display: block;
  font-size: 14px;
  opacity: 0.8;
}

/* LAYOUT */
.container {
  display: flex;
  padding: 20px;
  gap: 20px;
}

/* VIDEO */
.video {
  flex: 2;
  position: relative;
}

.video video {
  width: 100%;
  height: 420px;
  object-fit: cover;
  border-radius: 15px;
}

/* SOM */
.sound-btn {
  position: absolute;
  bottom: 20px;
  left: 20px;
  background: #d81b60;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 50px;
  cursor: pointer;
}

/* SIDEBAR */
.sidebar {
  flex: 1;
  background: white;
  padding: 20px;
  border-radius: 15px;
}

/* BOTÕES */
.tabs button {
  width: 100%;
  padding: 14px;
  margin-bottom: 10px;
  border: none;
  background: linear-gradient(135deg, #d81b60, #ad1457);
  color: white;
  border-radius: 10px;
}

/* CONTEÚDO */
.content {
  margin-top: 15px;
  padding: 15px;
  background: #fff;
  border-radius: 10px;
}

/* CARDS */
.card {
  padding: 12px;
  margin-bottom: 8px;
  border-radius: 10px;
  background: #fce4ec;
  cursor: pointer;
}

/* FOOTER */
footer {
  background: linear-gradient(135deg, #d81b60, #ad1457);
  color: white;
  text-align: center;
  padding: 15px;
}
</style>
</head>

<body>

<!-- INTRO -->
<div class="intro">
  <div class="eyes">
    <div class="eye"></div>
    <div class="eye"></div>
  </div>
  <h1>STUDIO_JULIEBARROSO</h1>
</div>

<header class="header-premium">
  <div class="logo">
    <span>Studio</span>
    Julie Barroso
  </div>
</header>

<div class="container">

  <div class="video">
    <video id="videoPlayer" autoplay muted loop controls>
      <source src="apresentacao.mp4" type="video/mp4">
    </video>

    <button class="sound-btn" onclick="toggleSound()">🔊</button>
  </div>

  <div class="sidebar">

    <div class="tabs">
      <button onclick="showTab(1)">Sobre</button>
      <button onclick="showTab(2)">Cílios</button>
      <button onclick="showTab(3)">Localização</button>
    </div>

    <div class="content" id="content">
      Clique em uma opção 💖
    </div>

  </div>

</div>

<footer>
  © Studio Julie Barroso • Extensão de Cílios 💖
</footer>

<script>
function toggleSound(){
  const video = document.getElementById("videoPlayer");
  video.muted = !video.muted;
}

function showTab(tab){
  const content = document.getElementById("content");

  if(tab === 1){
    content.innerHTML = `
      <h3>Sobre</h3>
      <p>Especialistas em extensão de cílios, trazendo beleza e autoestima.</p>
    `;
  }

  if(tab === 2){
    let lista = "<h3>Serviços de Cílios</h3>";
    const nomes = ["Clássico","Volume Russo","Híbrido","Mega Volume","Fox Eyes","Lash Lift","Manutenção","Remoção","Design","Personalizado"];

    nomes.forEach((n,i)=>{
      lista += `<div class="card" onclick="detalhe('${n}')">✨ ${n}</div>`;
    });

    content.innerHTML = lista;
  }

  if(tab === 3){
    content.innerHTML = `
      <iframe src="https://maps.google.com/maps?q=Studio%20Julie%20Barroso&output=embed" width="100%" height="200"></iframe>
    `;
  }
}

function detalhe(nome){
  const content = document.getElementById("content");

  content.innerHTML = `
    <h3>${nome}</h3>
    <p>Técnica profissional para realçar seu olhar com elegância e durabilidade.</p>
    <button onclick="showTab(2)">Voltar</button>
  `;
}
</script>

</body>
</html>
